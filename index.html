function enterAltar(n) {
  syncCSSUnit();
  if (window.THREE) {
    initThreeRoom('fa', 'three-canvas-fa');
    clearThreeOverlay('fa');
  }
  S.fNum = n; S.segSize = 0; S.handleIndex = 0; S.handleInverted = false;
  S.fDisc = S.fDiscMap[n] ? new Set(S.fDiscMap[n]) : new Set([1,n]);
  S.trayIdentityReady = n === 1; /* primes: defer until after grow animation */
  S._deferredRoomCelebration = null;
  const numEl = document.getElementById('altar-numeral');
  numEl.textContent = n;
  numEl.classList.remove('solved','celebrate');
  
  const presolvedOnEnter = (n===1 || isPrime(n));
  if(presolvedOnEnter) S.fDone.add(n);
  const isSolved = S.fDone.has(n);
  if(isSolved) numEl.classList.add('solved');
  numEl.onclick = isSolved ? () => goToGrid() : null;
  
  const altar = document.getElementById('fa');
  bindAltarIdleHintReset(document.getElementById('altar-screen'));
  /* Available height = from obelisk base to top of altar area, minus some header margin */
  const obBasePx = getObeliskBase('fa');
  const altarH = altar.clientHeight;
  let safeAltarH = obBasePx - 30; /* 30px margin from top of altar */
  if (safeAltarH <= 0) safeAltarH = altarH * 0.5; 
  S.refAltarH = safeAltarH; 
  
  const neededHeight = n * S.unitH;
  S.fZoom = neededHeight > S.refAltarH ? (S.refAltarH / neededHeight) : 1;
  S.segs = [{units:n}];
  buildDex('altar-dex-vp');
  renderFT();

  growFromUnits(n, () => {
    if(isPrime(n)){
      const isNew = !S.primeDex.has(n);
      if(isNew) {
          renderSegs();
          launchTrinketDrop(n, 1, () => {
            S.trayIdentityReady = true;
            renderFT();
            runAltarRoomSolvedVision({ wasAlreadySolved: true });
          });
      } else {
          S.trayIdentityReady = true;
          renderSegs(); renderFT();
          runAltarRoomSolvedVision({ wasAlreadySolved: true });
      }
    } else {
      if (n > 1) S.trayIdentityReady = true;
      renderSegs(); renderFT();
    }
  });
}

function growFromUnits(n, onComplete) {
  const stage = document.getElementById('fo');
  stage.innerHTML = '';
  clearThreeStage('fa');
  stage.style.visibility = 'visible';
  stage.style.marginLeft = `${-S.unitW/2}px`;
  const zoomEl = document.getElementById('fz');
  zoomEl.style.bottom = `${getObeliskBase("fa")}px`;
  zoomEl.style.transition = 'none';
  zoomEl.style.transform = `translateX(0) scale(${S.fZoom})`;
  S.currentFoldZoom = S.fZoom;
  
  const uH = S.unitH, uW = S.unitW;
  const blocks = [];
  
  for(let i=0; i<n; i++) {
    const blk = makeBlock(1, uW, uH, false, false);
    applyMirrorReflectY(blk, i, n);
    blk.style.position = 'absolute';
    blk.style.bottom = `${i * uH}px`;
    blk.style.left = '0';
    blk.style.transform = 'scale(0)';
    stage.appendChild(blk);
    blocks.push(blk);
    syncThreeBlock(blk);
  }
  
  const room = THREE_WORLD.rooms.fa;
  const tl = gsap.timeline({
    onStart: () => haptic(15),
    onComplete: () => {
      blocks.forEach(blk => delete blk.dataset.animating);
      const isP = isPrime(n);
      const flash = document.createElement('div');
      flash.style.cssText = `position:absolute; bottom:0; left:0; width:${uW}px; height:${n*uH}px; z-index:100; opacity:0; border-radius:4px; pointer-events:none;`;
      if(isP) {
        flash.style.background = '#FF8C00';
        flash.style.boxShadow = '0 0 60px 20px rgba(255, 215, 0, 0.8)';
      } else {
        flash.style.background = '#ffffff';
        flash.style.boxShadow = '0 0 50px 20px rgba(255,255,255,0.9)';
      }
      stage.appendChild(flash);
      
      gsap.to(flash, {
        opacity: 1, duration: 0.15, yoyo: true, repeat: 1, ease: "power2.inOut",
        onStart: () => haptic([40, 60]),
        onComplete: () => { flash.remove(); onComplete(); }
      });
    }
  });
  blocks.forEach((blk, i) => {
    const mesh = blk._mesh;
    /* Don't show 3D mesh during grow — CSS blocks handle the animation visual.
       The 3D mesh at OBELISK_Z projects at a different scale than the CSS overlay. */
    mesh.visible = false;
    
    tl.to(blk, { scale: 1, duration: 0.6, ease: "back.out(1.5)" }, i * 0.2);
  });
}

function showAffirm(){const e=document.getElementById('affirm');e.classList.add('show');haptic([20,25,20,25,40]);setTimeout(()=>e.classList.remove('show'),350);}

function calcFoldZoom(numPieces,segUnits,foldDir){
  const segW = S.unitW + 3;
  const totalFrameW = 2 * numPieces * segW;
  const altarW = document.getElementById('fa').clientWidth;
  const segH = segUnits * S.unitH;
  const altarH = S.refAltarH;
  const zoomW = altarW * 0.8 / totalFrameW;
  const zoomH = altarH / segH;
  return Math.min(zoomW, zoomH, S.fZoom); 
}

function makeBlock(units, w, h, forceComposite=false, omitNumeral=false){
  const isMirror = units === 1 && !forceComposite;
  const p = !forceComposite && !isMirror && isPrime(units);
  const el = document.createElement('div');
  el.className = 'blk ' + (isMirror ? 'blk-m mirror-cube' : p ? 'blk-p' : 'blk-c');
  el.style.width = `var(--u)`;
  el.style.height = `calc(var(--u) * ${units})`;
  el.dataset.units = units;
  el._mesh = createThreeBlockMesh(units, w, h, forceComposite);
  el._meshBase = { w: Math.max(18, w), h: Math.max(18, h) };
  attachBlockLabel(el._mesh, units, w, h, omitNumeral, forceComposite);
  el._syncMesh = () => { syncThreeBlock(el); requestThreeRender(); };
  requestAnimationFrame(el._syncMesh);
  if(omitNumeral) return el;
  
  if(isMirror) {
    const num = document.createElement('div'); num.className = 'n-mirror'; num.textContent = '1';
    num.style.fontSize = Math.min(w*0.55, h*0.4, 34)+'px'; el.appendChild(num);
  } else if(p) {
    const num = document.createElement('div'); num.className = 'n-glow'; num.textContent = units;
    num.style.fontSize = Math.min(w*0.6, h*0.45, 38)+'px'; el.appendChild(num);
  } else {
    const num = document.createElement('div'); num.className = 'n-stamp'; num.textContent = units;
    num.style.fontSize = Math.min(w*0.55, h*0.4, 34)+'px'; el.appendChild(num);
  }
  return el;
}

function makeAnimBlock(units, w, h){
  const el = document.createElement('div');
  el.className = 'blk blk-c anim-block';
  el.style.width = `var(--u)`;
  el.style.height = `calc(var(--u) * ${units})`;
  el.dataset.units = units;
  return el;
}

/** Vertical stack of mirror "1" cells: shift shared tall-room reflection (see .mirror-cube background-size). */
function applyMirrorReflectY(el, indexInStack, stackTotal){
  if (!el || !el.classList.contains('mirror-cube')) return;
  if (!stackTotal || stackTotal <= 1) el.style.setProperty('--reflect-y', '52%');
  else el.style.setProperty('--reflect-y', `${100 - (indexInStack / (stackTotal - 1)) * 100}%`);
}

function buildDex(vpId='altar-dex-vp'){
  const vp=document.getElementById(vpId);
  if(!vp)return;
  vp.innerHTML='';
  for(let i=1;i<=144;i++){
    const slot=document.createElement('div');
    slot.className='dex-slot';
    slot.dataset.n=i;
    const wrap=document.createElement('div'); wrap.className='dex-trinket-wrap';
    if(i===1){
      slot.classList.add('has-prime');
      const mir=document.createElement('div'); mir.className='dex-mirror mirror-cube';
      const num=document.createElement('div'); num.className='n-mirror'; num.textContent='1';
      mir.appendChild(num); wrap.appendChild(mir);
    } else if(isPrime(i)){
      if(S.primeDex.has(i)){
        slot.classList.add('has-prime');
        const t=document.createElement('div');
        t.className='dex-trinket';
        const num=document.createElement('div'); num.className='dt-num'; num.textContent=i;
        t.appendChild(num); wrap.appendChild(t);
      } else {
        slot.classList.add('locked');
      }
    }
    slot.appendChild(wrap);
    if (!slot.classList.contains('locked')) {
      const lbl=document.createElement('div'); lbl.className='dex-num'; lbl.textContent=i;
      slot.appendChild(lbl);
    }
    vp.appendChild(slot);
  }
  S.newPrimes.clear();
  vp.scrollLeft=0;
  if(!vp._scrollBound){
    vp._scrollBound=true;
    vp.addEventListener('scroll',()=>{if(vp.scrollLeft<0)vp.scrollLeft=0;},{passive:true});
  }
}

function scrollDexToSlot(n, vpId, cb){
  const vp=document.getElementById(vpId);
  const container=vp?.closest('.dex-container');
  if(!vp||!container){cb&&cb();return;}
  const slotW=46 + 10; 
  const targetScroll=(n)*slotW - container.clientWidth/2 + slotW/2;
  vp.scrollTo({left:Math.max(0,targetScroll),behavior:'smooth'});
  setTimeout(()=>{cb&&cb();},500);
}

// THE TWIN CEREMONY

function flushDeferredRoomCelebration(){
  const fn = S._deferredRoomCelebration;
  S._deferredRoomCelebration = null;
  if (typeof fn === 'function') fn();
}

function launchTrinketDrop(primeN, segCount, onDone){
  const vpId = S.gridMode === 'build' ? 'build-dex-vp' : 'altar-dex-vp';
  const stage = document.getElementById(S.gridMode === 'build' ? 'bo' : 'fo');
  const vp = document.getElementById(vpId);
  if(!stage||!vp){ if(typeof onDone==='function') onDone(); return; }

  const segEls=Array.from(stage.querySelectorAll('.blk'));
  let srcEl=null;
  if(segCount<=1){
    srcEl=segEls[0];
  } else if(segCount%2===1){
    srcEl=segEls[Math.floor(segCount/2)];
  } else {
    srcEl=segEls[segCount/2-1];
  }
  if(!srcEl){ if(typeof onDone==='function') onDone(); return; }

  // 1. Ignition (Main Obelisk)
  if (srcEl && !srcEl.classList.contains('blk-p')) {
      srcEl.classList.remove('blk-c');
      srcEl.classList.add('blk-p');
      const oldStamp = srcEl.querySelector('.n-stamp');
      if (oldStamp) {
          oldStamp.className = 'n-glow';
      }
  }

  // 2. The Twin Emerges
  const srcRect=srcEl.getBoundingClientRect();
  const srcW=srcRect.width;
  const srcH=srcRect.height;
  const srcCX=srcRect.left+srcW/2;
  const srcCY=srcRect.top+srcH/2;

  const tw=36;
  const th=36;

  const clone=document.createElement('div');
  clone.style.cssText=`position:fixed;z-index:9000;pointer-events:none;width:${srcW}px;height:${srcH}px;left:${srcRect.left}px;top:${srcRect.top}px;transform-origin:center center;border-radius:4px;overflow:visible;background:radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.03) 18%, transparent 30%), radial-gradient(circle at 50% 50%, rgba(255,244,214,0.12) 0%, rgba(255,214,122,0.14) 18%, rgba(222,116,255,0.12) 40%, rgba(112,178,255,0.1) 58%, rgba(12,10,34,0.18) 72%, rgba(2,2,10,0.98) 100%);border:1px solid rgba(190,210,255,0.18);box-shadow:0 0 16px rgba(120,180,255,0.16),0 0 32px rgba(255,150,220,0.12),0 0 58px rgba(255,236,170,0.08),0 10px 16px rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;`;
  
  const numEl=document.createElement('div');
  const numFontSize=Math.min(srcW*0.6,srcH*0.45,38);
  numEl.style.cssText=`font-family:'Lexend',sans-serif;font-weight:900;font-size:${numFontSize}px;letter-spacing:-1px;color:#fff;text-shadow:0 0 2px rgba(255,255,255,0.95),0 0 8px rgba(255,255,255,0.9),0 0 16px rgba(170,210,255,0.68),0 0 28px rgba(120,180,255,0.42),0 0 48px rgba(255,120,220,0.28),0 0 72px rgba(80,40,140,0.2);position:relative;z-index:2;`;
  numEl.textContent=primeN;
  clone.appendChild(numEl);
  document.body.appendChild(clone);

  vp.querySelectorAll('.dex-slot[data-n]').forEach(sl=>{
    sl.classList.toggle('dimmed',parseInt(sl.dataset.n)!==primeN);
  });
  scrollDexToSlot(primeN,vpId,null);

  // 4. Compression
  const compressDur=600;
  const scaleY=th/srcH;
  const scaleX=tw/srcW;
  clone.style.transition=`transform ${compressDur}ms cubic-bezier(0.4,0,0.6,1)`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    clone.style.transform=`scaleX(${scaleX}) scaleY(${scaleY})`;
  }));

  // 5. The Float
  setTimeout(()=>{
    const slot = vp.querySelector(`.dex-slot[data-n="${primeN}"]`);
    const container = vp.closest('.dex-container');
    const dexRect = container.getBoundingClientRect();
    let landX = dexRect.left+dexRect.width/2; 
    let landY = dexRect.top+dexRect.height/2;
    if(slot){
      const slotRect=slot.getBoundingClientRect();
      landX=slotRect.left+slotRect.width/2;
      landY=slotRect.top+slotRect.height/2;
    }

    const dropDur=400;
    const dx=landX-srcCX;
    const dy=landY-srcCY;
    clone.style.transition=`transform ${dropDur}ms cubic-bezier(0.4,0,1,1)`;
    clone.style.transform=`scaleX(${scaleX}) scaleY(${scaleY}) translate(${dx/scaleX}px,${dy/scaleY}px)`;

    setTimeout(()=>{
      // 6. Registration
      haptic([15,10,40]);
      clone.remove();
      const targetSlot=vp.querySelector(`.dex-slot[data-n="${primeN}"]`);
      if(targetSlot){
        targetSlot.classList.remove('locked');
        targetSlot.classList.add('has-prime');
        targetSlot.classList.add('land-flash');
        const wrap = targetSlot.querySelector('.dex-trinket-wrap');
        wrap.innerHTML = '';
        const t = document.createElement('div');
        t.className = 'dex-trinket';
        const num = document.createElement('div'); num.className = 'dt-num'; num.textContent = primeN;
        t.appendChild(num); wrap.appendChild(t);
      }
      S.primeDex.add(primeN); // permanent
      S.newPrimes.add(primeN);
      buildDex(vpId);
      setTimeout(()=>scrollDexToSlot(primeN,vpId,null),50);
      setTimeout(()=>{
        vp.querySelectorAll('.dex-slot').forEach(sl=>sl.classList.remove('dimmed','spotlight'));
        if (typeof onDone === 'function') onDone();
      },800);
    },dropDur+40);
  },compressDur+200); 
}

// ════════════════════════════════════════
// V11 HYBRID PHYSICS ENGINE
// ════════════════════════════════════════
function buildNestTree(numPieces, segH, uW, foldDir, startFolded) {
  const hinges = [];

  function build(level) {
    const container = document.createElement('div');
    container.style.cssText = `position:absolute;bottom:0;left:0;width:${uW}px;height:0;`;

    const blk = makeAnimBlock(S.segSize || S.fNum, uW, segH);
    blk.style.position = 'absolute';
    blk.style.bottom = '0';
    blk.style.left = '0';
    container.appendChild(blk);

    if (level < numPieces - 1) {
      const hw = document.createElement('div');
      
      const depth = numPieces - 1 - level;
      const dir = depth % 2 === 0 ? -foldDir : foldDir;
      const origin = dir < 0 ? '0% 100%' : '100% 100%';
      const rot = dir < 0 ? -180 : 180;

      hw.style.cssText = `position:absolute;bottom:${segH}px;left:0;width:${uW}px;height:0;transform-origin:${origin};`;
      if (startFolded) hw.style.transform = `rotate(${rot}deg)`;
      
      hw._dir = dir; 
      hw._rot = rot; 
      
      const child = build(level + 1);
      hw.appendChild(child);
      container.appendChild(hw);
      hinges.push({ hw, rot, dir, depth });
    }
    return container;
  }
  return { root: build(0), hinges };
}

function renderSegs() {
  clearObeliskIdleHints();
  const stage = document.getElementById('fo'); 
  stage.innerHTML = '';
  clearThreeStage('fa');
  if (S.segs.length === 0) return;
  
  const uH = S.unitH, uW = S.unitW, numSegs = S.segs.length, gap = 3;
  const zoomEl = document.getElementById('fz');
  zoomEl.style.bottom = `${getObeliskBase("fa")}px`;
  
  if (numSegs === 1) {
    zoomEl.classList.remove('folded');
    stage.style.marginLeft = `${-uW/2}px`;
    zoomEl.style.transition = 'transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)';
    zoomEl.style.transform = `translateX(0) scale(${S.fZoom})`;
    S.currentFoldZoom = S.fZoom;
  } else {
    const falls = numSegs - 1;
    const oddFalls = falls % 2 === 1;
    const landsLeft = oddFalls ? (S.foldDir < 0) : (S.foldDir > 0);
    const baseCenter = landsLeft ? ((numSegs - 1) * (uW + gap) + uW / 2) : (uW / 2);
    stage.style.marginLeft = (-baseCenter) + 'px';
    
    const zoom = S.currentFoldZoom || calcFoldZoom(numSegs, S.segs[0].units, S.foldDir);
    zoomEl.style.transition = 'none';
    zoomEl.style.transform = `translateX(0) scale(${zoom})`;
    zoomEl.classList.add('folded');
  }

  const isSolved = S.fDone.has(S.fNum);
  const falls = numSegs - 1;
  const oddFalls = falls % 2 === 1;
  const landsLeft = oddFalls ? (S.foldDir < 0) : (S.foldDir > 0);

  stage.classList.toggle('obelisk-pillar', numSegs === 1);
  stage.classList.toggle('seg-array', numSegs > 1);
  const mirrorSegCount = S.segs.filter(s => s.units === 1).length;

  S.segs.forEach((seg, i) => {
    const h = seg.units * uH;
    const el = makeBlock(seg.units, uW, h);
    el.classList.toggle('blk-pillar', numSegs === 1);
    if (el.classList.contains('mirror-cube')) {
      const idxAmongOnes = S.segs.slice(0, i + 1).filter(s => s.units === 1).length - 1;
      applyMirrorReflectY(el, idxAmongOnes, mirrorSegCount);
    }
    
    el.dataset.rotationZ = '0';

    if (numSegs === 1) {
      el.addEventListener('pointerdown', e => { 
        if(!S.folding) { e.preventDefault(); beginUnspool(); } 
      });
      if (!isPrime(seg.units)) {
        properFactors(seg.units).forEach(f => {
          const hingeY = f * uH;
          const zone = document.createElement('div'); zone.className = 'hz'; zone.style.top = hingeY + 'px';
          zone.addEventListener('pointerdown', e => { e.stopPropagation(); zone.classList.remove('nudge'); });
          zone.addEventListener('pointerup', e => { e.stopPropagation(); doFold(f, -1, zone); });
          el.appendChild(zone);
        });
      }
    } else {
      if (i === S.handleIndex) {
        el.addEventListener('pointerdown', e => {
          el.querySelector('.drag-hint-bar')?.remove();
          if (!S.folding) {
            e.preventDefault();
            haptic(12);
            const z = document.getElementById('fz');
            const cur = S.currentFoldZoom || S.fZoom;
            if (z && typeof gsap !== 'undefined') {
              gsap.killTweensOf(z);
              gsap.fromTo(z, { scale: cur * 1.04 }, { scale: cur, duration: 0.2, ease: 'elastic.out(1.35)' });
            }
            beginUnspool();
          }
        });
      }
    }
    stage.appendChild(el);
    syncThreeBlock(el);
  });
  scheduleObeliskIdleHints();
  syncThreeBlocks(stage);
  if (needsAnimLoop()) startThreeAnimLoop(); else stopThreeAnimLoop();
}

function doFold(f, swipeSide, clickedZone) {
  if (S.folding || S.segs.length !== 1) return;
  S.folding = true; haptic(50);
  
  const totalUnits = S.segs[0].units;
  if (totalUnits % f !== 0) { S.folding = false; return; }
  
  if (clickedZone) clickedZone.style.display = 'none';
  
  const numPieces = totalUnits / f;
  const uH = S.unitH, uW = S.unitW, segH = f * uH;
  
  S.foldDir = swipeSide; 
  S.segSize = f;

  const stage = document.getElementById('fo');
  stage.querySelectorAll('.n-stamp,.n-glow,.n-radiance').forEach(el => el.remove());
  stage.style.visibility = 'hidden';
  clearThreeStage('fa');

  const altar = document.getElementById('fa');
  const overlay = document.createElement('div');
  overlay.className = 'anim-overlay';
  clearThreeOverlay('fa');
  
  overlay.style.cssText = `position:absolute;bottom:${getObeliskBase("fa")}px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.fZoom});z-index:110;pointer-events:none;width:${uW}px;`;

  const foldZoom = calcFoldZoom(numPieces, f, S.foldDir);
  const zoomEl = document.getElementById('fz');
  if (foldZoom < (S.fZoom - 0.02)) {
    gsap.to(zoomEl, { scale: foldZoom, duration: 1.2, ease: "power2.inOut" });
    S.currentFoldZoom = foldZoom;
  } else { 
    S.currentFoldZoom = S.fZoom; 
  }
  
  altar.appendChild(overlay);

  const { root, hinges } = buildNestTree(numPieces, segH, uW, S.foldDir, false);
  overlay.appendChild(root);
  const sorted = [...hinges].sort((a, b) => a.depth - b.depth);
  const hingeElements = sorted.map(item => item.hw);

  let tl = gsap.timeline({
    onComplete: () => {
      gsap.to(document.getElementById('fa'), { y: 4, duration: 0.05, yoyo: true, repeat: 3, ease: "bounce.out" });

      const isNewFactor = !S.fDisc.has(f);
      const isNewPrime = isPrime(f) && !S.primeDex.has(f);
      if (isNewFactor) S.fDisc.add(f);
      if (isNewPrime) S.trayIdentityReady = false;
      
      renderFT(); 
      checkFSolved({ deferVision: isNewPrime });
      
      S.segs = []; 
      for (let i = 0; i < numPieces; i++) S.segs.push({ units: f });
      
      const falls = numPieces - 1;
      const oddFalls = falls % 2 === 1;
      const landsLeft = oddFalls ? (S.foldDir < 0) : (S.foldDir > 0);
      S.handleIndex = landsLeft ? 0 : numPieces - 1;
      S.handleInverted = oddFalls;

      S.folding = false;
      clearThreeOverlay('fa');
      overlay.remove(); 
      stage.style.visibility = 'visible'; 
      
      renderSegs();

      if (isNewFactor) {
        setTimeout(() => {
          const newItems = document.querySelectorAll('#ft .fs');
          const newTrayItem = Array.from(newItems).find(el => el.textContent == f && !el.dataset.beamed);
          if (newTrayItem) {
            newTrayItem.dataset.beamed = "true";
            gsap.fromTo(newTrayItem, 
              { opacity: 0, filter: 'brightness(5) blur(15px)', y: -50, scale: 1.5 },
              { opacity: 1, filter: 'brightness(1) blur(0px)', y: 0, scale: 1, duration: 1.2, ease: 'power2.out' }
            );
          }
        }, 50);
      }
      
      if (isNewPrime) setTimeout(() => launchTrinketDrop(f, numPieces, () => {
        S.trayIdentityReady = true;
        renderFT();
        flushDeferredRoomCelebration();
      }), isPrime(f) ? 900 : 200);
      else buildDex('altar-dex-vp');
    }
  });

  tl.to(hingeElements, {
    rotation: (index, target) => target._rot,
    duration: 1.2, stagger: 0.15, ease: "bounce.out",
    onStart: () => haptic(40),
  });
}

let US = null;

function beginUnspool(){
  if(S.folding||S.segs.length<=1)return;
  clearObeliskIdleHints();
  S.folding=true;
  const stage=document.getElementById('fo');const altar=document.getElementById('fa');
  const uH=S.unitH,uW=S.unitW,numSegs=S.segs.length,segH=S.segs[0].units*uH;
  stage.style.visibility='hidden';
  clearThreeStage('fa');
  clearThreeOverlay('fa');

  const overlay=document.createElement('div');
  overlay.className = 'anim-overlay';
  overlay.style.cssText=`position:absolute;bottom:${getObeliskBase("fa")}px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.currentFoldZoom || S.fZoom});z-index:110;width:${uW}px;`;
  altar.appendChild(overlay);

  const{root,hinges}=buildNestTree(numSegs,segH,uW,S.foldDir,true);
  overlay.appendChild(root);
  const sorted=[...hinges].sort((a,b)=>a.depth-b.depth);
  sorted.forEach(({hw})=>{hw.style.transition='none';});

  const overlap=0.5;
  const n=sorted.length;
  const windowSize=1/(1+(n-1)*(1-overlap));
  const starts=sorted.map((_,i)=>i*(1-overlap)*windowSize);

  const totalDragDist=(numSegs-1)*segH*1.2;
  const startZoom=S.currentFoldZoom||S.fZoom;
  
  const falls = numSegs - 1;
  const oddFalls = falls % 2 === 1;
  const landsLeft = oddFalls ? (S.foldDir < 0) : (S.foldDir > 0);
  const centerSign = landsLeft ? 1 : -1;

  US={overlay,sorted,starts,windowSize,totalDragDist,startY:null,startX:null,active:true,startZoom,centerSign};

  const zoomEl=document.getElementById('fz');
  const onMove=e=>{
    if(!US||!US.active)return;e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    if(US.startY===null){US.startY=t.clientY; US.startX=t.clientX;}
    
    const dragY=US.startY-t.clientY; 
    const dragX=(t.clientX-US.startX)*US.centerSign;
    const combined=dragY+Math.max(0,dragX)*0.4; 
    
    const progress=Math.max(0,Math.min(1,combined/US.totalDragDist));
    US.sorted.forEach(({hw,rot},i)=>{
      const hProg=Math.max(0,Math.min(1,(progress-US.starts[i])/US.windowSize));
      hw.style.transform=`rotate(${rot*(1-hProg)}deg)`;
    });
    if(US.startZoom<S.fZoom){
      const dragZoom=US.startZoom+(S.fZoom-US.startZoom)*progress;
      zoomEl.style.transition='none';
      zoomEl.style.transform=`translateX(0) scale(${dragZoom})`;
    }
  };
  const onUp=e=>{
    if(!US||!US.active)return;
    const t=e.changedTouches?e.changedTouches[0]:e;
    if(US.startY===null){cancelUS(onMove,onUp);return;}
    
    const dragY=US.startY-t.clientY;
    const dragX=(t.clientX-US.startX)*US.centerSign;
    const combined=dragY+Math.max(0,dragX)*0.4;
    const progress=combined/US.totalDragDist;
    
    if(progress>=0.85)completeUS(onMove,onUp);else cancelUS(onMove,onUp);
  };
  document.addEventListener('pointermove',onMove,{passive:false});
  document.addEventListener('pointerup',onUp);
}

function cancelUS(onMove,onUp){
  if(!US)return;US.active=false;
  US.sorted.forEach(({hw,rot})=>{hw.style.transition='transform 0.4s var(--ease-heavy)';hw.style.transform=`rotate(${rot}deg)`;});
  if(US.startZoom<S.fZoom){
    const zoomEl=document.getElementById('fz');
    zoomEl.style.transition='transform 0.4s ease';
    zoomEl.style.transform=`translateX(0) scale(${US.startZoom})`;
  }
  setTimeout(()=>{
    clearThreeOverlay('fa');
    US?.overlay?.remove();
    document.getElementById('fo').style.visibility='visible';
    S.folding=false;US=null;
    scheduleObeliskIdleHints();
  },450);
  document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);
}

function completeUS(onMove,onUp){
  if(!US)return;US.active=false;haptic([20,30,20]);
  US.sorted.forEach(({hw})=>{hw.style.transition='transform 0.2s var(--spring)';hw.style.transform='rotate(0deg)';});
  const zoomEl=document.getElementById('fz');
  zoomEl.style.transition='transform 0.3s var(--spring)';
  zoomEl.style.transform=`translateX(0) scale(${S.fZoom})`;
  S.currentFoldZoom=S.fZoom;
  setTimeout(()=>{
    clearThreeOverlay('fa');
    US?.overlay?.remove();
    document.getElementById('fo').style.visibility='visible';
    S.segs=[{units:S.fNum}];S.folding=false;US=null;
    renderSegs();
  },250);
  document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);
}

function checkFSolved(opts){

function getPrimeFactors(n){ const f=[];let x=n; for(let p=2;p*p<=x;p++){while(x%p===0){f.push(p);x/=p;}} if(x>1)f.push(x); return f; }
function makeCellSolved(n, factors, clickFn){
  const c=document.createElement('div'); c.className='nc done';
  const num=document.createElement('div');num.className='nc-num';num.textContent=n; c.appendChild(num);
  if(factors.length>0){
    const wrap=document.createElement('div');wrap.className='nc-trinkets';
    factors.slice(0,12).forEach(f=>{
      const t=document.createElement('div'); t.className='nc-t '+(f===1?'nc-tm':isPrime(f)?'nc-tp':'nc-tc'); t.textContent=f; wrap.appendChild(t);
    });
    if(factors.length>12){ const ov=document.createElement('div');ov.className='nc-overflow'; ov.textContent='+';wrap.appendChild(ov); }
    c.appendChild(wrap);
  }
  c.addEventListener('click',clickFn); return c;
}

function renderGrid(){
  const g=document.getElementById('num-grid');g.innerHTML='';

  if(S.gridMode==='factor'){
    for(let i=1;i<=max;i++){
      let c;
      if(S.fDone.has(i)){ c=makeCellSolved(i,allFactors(i),()=>goToAltar(i)); } 
      else {
        c=document.createElement('div'); c.className='nc avail';
        const num=document.createElement('div');num.className='nc-num';num.textContent=i; c.appendChild(num);

    }
  } else {
    for(let i=1;i<=max;i++){
      let c;
      const canBuild=i===1||S.bDone.has(i)||(i>1&&S.bDone.has(i-1));
      const built=S.bDone.has(i);
      const neededPrimes=i>1?getPrimeFactors(i):[];
      const hasAllPrimes=neededPrimes.every(p=>S.primeDex.has(p));
      if(built||i===1){ c=makeCellSolved(i,i===1?[1]:getPrimeFactors(i),i>1?()=>goToBuild(i):null); } 
      else if(canBuild&&hasAllPrimes){
        c=document.createElement('div');c.className='nc avail';
        const num=document.createElement('div');num.className='nc-num';num.textContent=i; c.appendChild(num);
        c.addEventListener('click',()=>goToBuild(i));

        c=document.createElement('div');c.className='nc locked';
        const num=document.createElement('div');num.className='nc-num'; num.textContent=i; c.appendChild(num);
      }
      g.appendChild(c);
    }
    for(let i=max+1;i<=max+12;i++){
      const c=document.createElement('div');c.className='nc locked';
      const num=document.createElement('div');num.className='nc-num';num.textContent=i; c.appendChild(num);g.appendChild(c);
    }
  }
}

function renderBuildTray(){
  const tray=document.getElementById('bt');tray.innerHTML='';
  const n=S.bNum;if(!n)return;
  /* Build the expected prime factorization to know how many slots */
  const expectedPrimes = getPrimeFactors(n);
  /* Current placed primes (excluding 1s) */
  const placedPrimes = S.bStack.filter(e => e.p !== 1).map(e => e.p);
  
  /* One slot per expected prime factor — NO mirror-1 slot (build is primes only) */
  expectedPrimes.forEach((expectedP,i)=>{
    const s=document.createElement('div');s.className='fs';
    s.dataset.units='1';
    if(i < placedPrimes.length){
      /* This slot is filled */
      const p = placedPrimes[i];
      const txt=document.createElement('div');txt.textContent=p;
      if(isPrime(p)){
        s.classList.add('fp');
        txt.className='dt-num';
      } else {
        s.classList.add('fc');
        txt.style.position='relative';txt.style.zIndex='2';
      }
      s.appendChild(txt);
      /* Last placed trinket can be undone by dragging down */
      if(i===placedPrimes.length-1){
        s.classList.add('last'); s.style.touchAction='none';
        s.addEventListener('pointerdown',e=>{
          if(S.bAnimating)return; e.preventDefault(); s.setPointerCapture(e.pointerId);
          const startY=e.clientY; let removed=false;
          const onMove=ev=>{ if(ev.clientY-startY>20&&!removed){ removed=true; s.removeEventListener('pointermove',onMove); s.removeEventListener('pointerup',onUp); undoBuild(); } };
          const onUp=()=>{ s.removeEventListener('pointermove',onMove); s.removeEventListener('pointerup',onUp); };
          s.addEventListener('pointermove',onMove,{passive:false}); s.addEventListener('pointerup',onUp);
        });
      }
    } else {
      /* Empty slot — hidden like factor tray empties */
      s.classList.add('empty');
    }
    tray.appendChild(s);
  });
  clearThreeOverlay('ba');
}

function hideProxyMesh(el) {

function placeBuildPrime(p){
  if(S.bAnimating)return;
  const n=S.bNum, prevProduct=S.bProduct, newProduct=prevProduct===0?p:prevProduct*p;
  
  S.bStack.push({p,prevProduct}); S.bProduct=newProduct;
  S.bAnimating = true;
  
  /* Update tray and ledger immediately so trinket appears on drop */
  renderBuildTray(); renderBuildLedger();

  if(prevProduct === 0) {
    if(newProduct > n) {
      /* FIRST PRIME OVERSHOOT: stack mirror cubes, explode at ceiling */
      animateBuildFirstPrimeOvershoot(p, n, () => {
        S.bStack.pop(); S.bProduct=0; S.bAnimating=false;
        renderBuildTray(); renderBuildStage(); renderBuildLedger();
      });
    } else {
      /* FIRST PRIME: grow mirror-1 cubes then fuse into prime obelisk */
      animateBuildFirstPrime(p, n, () => {
        S.bAnimating = false;
        renderBuildTray(); renderBuildStage(); renderBuildLedger();
        if(newProduct === n) checkBuildSolved();
      });
    }
  } else if(newProduct > n) {
    /* OVERSHOOT: sequential hinge with ceiling collision */
    animateBuildOvershoot(prevProduct, p, newProduct, n, () => { 
      S.bStack.pop(); S.bProduct=prevProduct; S.bAnimating=false; 
      renderBuildTray(); renderBuildStage(); renderBuildLedger(); 
    });
  } else {
    /* MULTIPLY: sequential hinge segments then fuse */
    animateBuildHinge(prevProduct, p, newProduct, n, () => {
      S.bAnimating=false;
      renderBuildTray(); renderBuildStage(); renderBuildLedger();
      if(newProduct===n)checkBuildSolved();
    });
  }
}

function animateBuildFirstPrime(p, target, onComplete) {
  /* Stack p mirror-1 cubes from bottom up, then flash-fuse into a prime obelisk */
  const stage = document.getElementById('bo');
  const uH = S.bUnitH, uW = S.bUnitW;
  stage.innerHTML = '';
  stage.style.marginLeft = `${-uW/2}px`;
  clearThreeStage('ba');
  stage.style.visibility = 'visible';

  const blocks = [];
  for(let i=0; i<p; i++) {
    const blk = makeBlock(1, uW, uH, false, false);
    applyMirrorReflectY(blk, i, p);
    blk.style.position = 'absolute';
    blk.style.bottom = `${i * uH}px`;
    blk.style.left = '0';
    blk.style.transform = 'scale(0)';
    stage.appendChild(blk);
    blocks.push(blk);
    syncThreeBlock(blk);
  }

  const tl = gsap.timeline({
    onStart: () => haptic(15),
    onComplete: () => {
      blocks.forEach(blk => delete blk.dataset.animating);
      /* Flash and fuse into a prime obelisk */
      const flash = document.createElement('div');
      flash.style.cssText = `position:absolute; bottom:0; left:0; width:${uW}px; height:${p*uH}px; z-index:100; opacity:0; border-radius:4px; pointer-events:none; background:#FF8C00; box-shadow:0 0 60px 20px rgba(255,215,0,0.8);`;
      stage.appendChild(flash);
      gsap.to(flash, {
        opacity: 1, duration: 0.15, yoyo: true, repeat: 1, ease: "power2.inOut",
        onStart: () => haptic([40, 60]),
        onComplete: () => {
          flash.remove();
          /* Replace mirror cubes with single prime obelisk */
          stage.innerHTML = '';
          clearThreeStage('ba');
          const primeObelisk = makeBlock(p, uW, p*uH);
          primeObelisk.classList.add('blk-pillar');
          stage.appendChild(primeObelisk);
          syncThreeBlock(primeObelisk);
          if (needsAnimLoop()) startThreeAnimLoop();
          onComplete();
        }
      });
    }
  });

  blocks.forEach((blk, i) => {
    const mesh = blk._mesh;
    mesh.visible = false;
    tl.to(blk, { scale: 1, duration: 0.6, ease: "back.out(1.5)" }, i * 0.2);
  });
}

function animateBuildFirstPrimeOvershoot(p, target, onRevert) {
  /* Stack mirror-1 cubes one by one. When a cube exceeds the target height,
     it hits the ceiling and the whole stack shatters. */
  const stage = document.getElementById('bo');
  const uH = S.bUnitH, uW = S.bUnitW;
  stage.innerHTML = '';
  stage.style.marginLeft = `${-uW/2}px`;
  clearThreeStage('ba');
  stage.style.visibility = 'visible';

  const blocks = [];
  for(let i=0; i<p; i++) {
    const blk = makeBlock(1, uW, uH, false, false);
    applyMirrorReflectY(blk, i, p);
    blk.style.position = 'absolute';
    blk.style.bottom = `${i * uH}px`;
    blk.style.left = '0';
    blk.style.transform = 'scale(0)';
    blk.style.visibility = 'hidden';
    stage.appendChild(blk);
    blocks.push(blk);
    syncThreeBlock(blk);
  }

  /* Animate cubes appearing one by one, stop at the one that exceeds target */
  const tl = gsap.timeline({ onStart: () => haptic(15) });
  const hitIndex = target; /* cube at index target (0-based) is the one that exceeds */

  blocks.forEach((blk, i) => {
    if(i > hitIndex) return;
    const mesh = blk._mesh;
    mesh.visible = false;

    if(i === hitIndex) {
      tl.to(blk, { scale: 1, visibility: 'visible', duration: 0.3, ease: "power2.out" }, i * 0.2);
      tl.call(() => {
        /* Shatter the whole stack */
        const ceilEl = document.getElementById('bceil');
        const contactY = ceilEl ? ceilEl.getBoundingClientRect().top : undefined;
        triggerShatter(stage, contactY);
        haptic([60,30,60,20,80]);
        setTimeout(() => {
          stage.innerHTML = '';
          clearThreeStage('ba');
          onRevert();
        }, 400);
      }, null, '+=0.05');
    } else {
      /* Normal cube landing — CSS only */
      tl.to(blk, { scale: 1, visibility: 'visible', duration: 0.6, ease: "back.out(1.5)" }, i * 0.2);
    }
  });
}

function makeAnimBlockMaterial(units, w, h, matClass){
  /* Like makeAnimBlock but with a specified material class */
  const el = document.createElement('div');
  el.className = 'blk ' + matClass + ' anim-block';
  el.style.width = `var(--u)`;
  el.style.height = `calc(var(--u) * ${units})`;
  el.dataset.units = units;
  return el;
}

function animateBuildHinge(prevH, p, finalH, target, cb){
  /*
   * prevH = current obelisk height (units), p = prime multiplier,
   * finalH = prevH * p, target = S.bNum
   *
   * Mechanic: show the existing obelisk as the base.
   * One at a time, hinge up new prevH-tall segments in PRIME material.
   * Each segment starts behind the top of the previous one, pointing down (6 o'clock),
   * then rotates CCW to point up (12 o'clock).
   * After all p segments are showing, flash-fuse into a single composite obelisk.
   */
  const stage = document.getElementById('bo'), altar = document.getElementById('ba');
  const uH = S.bUnitH, uW = S.bUnitW, segH = prevH * uH;
  stage.style.visibility = 'hidden';
  clearThreeStage('ba');
  clearThreeOverlay('ba');

  const overlay = document.createElement('div');
  overlay.className = 'three-proxy-layer anim-overlay';
  overlay.style.cssText = `position:absolute;bottom:${getObeliskBase("ba")}px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:110;pointer-events:none;width:${uW}px;overflow:visible;`;
  altar.appendChild(overlay);

  /* Base segment: the existing obelisk in its current material.
     prevH is prime only if this is the first multiplication (obelisk is still a raw prime).
     Any previous multiplication would have made prevH composite. */
  const isBaseComposite = !isPrime(prevH);
  const baseMat = isBaseComposite ? 'blk-c' : 'blk-p';
  const base = makeAnimBlockMaterial(prevH, uW, segH, baseMat);
  base.style.position = 'absolute'; base.style.bottom = '0'; base.style.left = '0'; base.style.zIndex = '10';
  /* Add numeral to base */
  const baseNum = document.createElement('div');
  baseNum.className = isBaseComposite ? 'n-stamp' : 'n-glow';
  baseNum.textContent = prevH;
  baseNum.style.fontSize = Math.min(uW*0.55, segH*0.4, 34)+'px';
  base.appendChild(baseNum);
  overlay.appendChild(base);

  /* Create p-1 new segments in PRIME material, each hinging from the top of the last */
  const copies = p - 1, phaseDur = 600, pause = 150;
  const arms = [];
  for(let i=0; i<copies; i++){
    const pivotBottom = (i + 1) * segH;
    const hw = document.createElement('div');
    hw.style.cssText = `position:absolute;bottom:${pivotBottom}px;left:0;width:${uW}px;height:0;transform-origin:50% 0%;transform:rotate(180deg);z-index:${5-i};visibility:hidden;`;
    const blk = makeAnimBlockMaterial(prevH, uW, segH, 'blk-p');
    blk.style.position = 'absolute'; blk.style.bottom = '0'; blk.style.left = '0';
    /* Add glowing numeral to each prime segment */
    const segNum = document.createElement('div');
    segNum.className = 'n-glow';
    segNum.textContent = prevH;
    segNum.style.fontSize = Math.min(uW*0.6, segH*0.45, 38)+'px';
    blk.appendChild(segNum);
    hw.appendChild(blk); overlay.appendChild(hw); arms.push({hw, blk});
  }

  /* Sequential hinge: each arm waits for the previous to finish */
  arms.forEach(({hw},i) => {
    setTimeout(() => {
      hw.style.visibility = 'visible';
      gsap.fromTo(hw, 
        { rotation: 180 },
        {
          rotation: 0,
          duration: phaseDur / 1000,
          ease: "power2.inOut",
          overwrite: 'auto',
          onStart: () => haptic(20),
        }
      );
    }, i * (phaseDur + pause));
  });

  /* After all arms land, flash and fuse into a single composite obelisk */
  const allLandedTime = copies * (phaseDur + pause) + 300;
  setTimeout(() => {
    /* White flash over entire column */
    const totalH = finalH * uH;
    const flash = document.createElement('div');
    flash.style.cssText = `position:absolute; bottom:0; left:0; width:${uW}px; height:${totalH}px; z-index:100; opacity:0; border-radius:4px; pointer-events:none; background:#ffffff; box-shadow:0 0 50px 20px rgba(255,255,255,0.9);`;
    overlay.appendChild(flash);
    gsap.to(flash, {
      opacity: 1, duration: 0.15, yoyo: true, repeat: 1, ease: "power2.inOut",
      onStart: () => haptic([40, 60]),
      onComplete: () => {
        clearThreeOverlay('ba');
        overlay.remove();
        stage.style.visibility = 'visible';
        renderBuildStage();
        cb && cb();
      }
    });
  }, allLandedTime);
}

function animateBuildOvershoot(prevH, p, finalH, target, cb){
  /*
   * Same as animateBuildHinge but one of the segments will collide with the ceiling.
   * Sequential hinge, each segment in prime material.
   * When a segment can't fully rotate to 0deg because it would exceed target height,
   * it partially rotates, hits the ceiling, and shatters.
   */
  const stage = document.getElementById('bo'), altar = document.getElementById('ba');
  const uH = S.bUnitH, uW = S.bUnitW, segH = prevH * uH, ceilPx = target * uH;
  stage.style.visibility = 'hidden';
  clearThreeStage('ba');
  clearThreeOverlay('ba');
  
  const overlay = document.createElement('div');
  overlay.className = 'anim-overlay';
  overlay.style.cssText = `position:absolute;bottom:${getObeliskBase("ba")}px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:110;pointer-events:none;width:${uW}px;overflow:visible;`;
  altar.appendChild(overlay);
  
  /* Base segment in current material */
  const isBaseComposite = !isPrime(prevH);
  const baseMat = isBaseComposite ? 'blk-c' : 'blk-p';
  const base = makeAnimBlockMaterial(prevH, uW, segH, baseMat);
  base.style.position = 'absolute'; base.style.bottom = '0'; base.style.left = '0'; base.style.zIndex = '10';
  const baseNum = document.createElement('div');
  baseNum.className = isBaseComposite ? 'n-stamp' : 'n-glow';
  baseNum.textContent = prevH;
  baseNum.style.fontSize = Math.min(uW*0.55, segH*0.4, 34)+'px';
  base.appendChild(baseNum);
  overlay.appendChild(base);
  
  const copies = p - 1, phaseDur = 600, pause = 150;
  const arms = [];
  for(let i=0; i<copies; i++){
    const pivotBottom = (i + 1) * segH;
    const hw = document.createElement('div');
    hw.style.cssText = `position:absolute;bottom:${pivotBottom}px;left:0;width:${uW}px;height:0;transform-origin:50% 0%;transform:rotate(180deg);z-index:${5-i};visibility:hidden;`;
    const blk = makeAnimBlockMaterial(prevH, uW, segH, 'blk-p');
    blk.style.position = 'absolute'; blk.style.bottom = '0'; blk.style.left = '0';
    hw.appendChild(blk); overlay.appendChild(hw); arms.push(hw);
  }
  
  /* Find which arm collides with the ceiling */
  let collisionArm = -1, collisionAngle = 0;
  for(let i=0; i<copies; i++){
    const pivotY = (i + 1) * segH;
    const headroom = ceilPx - pivotY;
    if(headroom >= segH) continue;
    const cosA = Math.max(-1, Math.min(1, headroom / segH));
    collisionAngle = Math.acos(cosA) * (180 / Math.PI);
    collisionArm = i; break;
  }
  const safeCount = collisionArm >= 0 ? collisionArm : copies;
  
  /* Sequential hinge for safe arms */
  for(let i=0; i<safeCount; i++){
    setTimeout(() => {
      arms[i].style.visibility = 'visible';
      gsap.fromTo(arms[i], 
        { rotation: 180 },
        {
          rotation: 0,
          duration: phaseDur / 1000,
          ease: "power2.inOut",
          overwrite: 'auto',
          onStart: () => haptic(20),
        }
      );
    }, i * (phaseDur + pause));
  }
  
  /* Collision arm: partially rotates then shatters */
  if(collisionArm >= 0){
    const fraction = (180 - collisionAngle) / 180;
    const collisionDur = Math.max(120, Math.round(phaseDur * fraction));
    setTimeout(() => {
      const hw = arms[collisionArm];
      hw.style.visibility = 'visible';
      gsap.fromTo(hw, 
        { rotation: 180 },
        {
          rotation: collisionAngle,
          duration: collisionDur / 1000,
          ease: "power2.inOut",
          overwrite: 'auto',
          onStart: () => haptic(20),
        }
      );
      setTimeout(() => {
        arms.forEach(a => { a.style.display = 'none'; });
        const ceilEl = document.getElementById('bceil');
        const contactY = ceilEl ? ceilEl.getBoundingClientRect().top : undefined;
        triggerShatter(overlay, contactY);
        setTimeout(() => { clearThreeOverlay('ba'); overlay.remove(); stage.style.visibility = 'visible'; cb&&cb(); }, 400);
      }, collisionDur + 30);
    }, collisionArm * (phaseDur + pause));
  }
}

function undoBuild(){
  if(S.bAnimating||S.bStack.length===0)return;
  const entry=S.bStack[S.bStack.length-1], p=entry.p, prevProduct=entry.prevProduct;
  if(prevProduct===0){ S.bStack.pop(); S.bProduct=0; haptic(20); renderBuildTray();renderBuildStage();renderBuildLedger(); return; }
  S.bAnimating=true; haptic(20);
  const stage=document.getElementById('bo'), altar=document.getElementById('ba'), uH=S.bUnitH, uW=S.bUnitW, segH=prevProduct*uH;
  stage.style.visibility='hidden';
  clearThreeStage('ba');
  clearThreeOverlay('ba');
  const overlay=document.createElement('div');
  overlay.className = 'anim-overlay';
  overlay.style.cssText=`position:absolute;bottom:${getObeliskBase("ba")}px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:110;pointer-events:none;width:${uW}px;overflow:visible;`;
  altar.appendChild(overlay);
  
  /* Base: show in the material it will revert to */
  const wasBaseComposite = !isPrime(prevProduct) || (S.bStack.length > 2);
  const baseMat = wasBaseComposite ? 'blk-c' : 'blk-p';
  const base=makeAnimBlockMaterial(prevProduct,uW,segH, baseMat);
  base.style.position='absolute';base.style.bottom='0';base.style.left='0';
  overlay.appendChild(base);
  
  const copies=p-1, phaseDur=350, pause=50;
  const arms=[];
  for(let i=0;i<copies;i++){
    const pivotBottom = (i + 1) * segH;
    const hw=document.createElement('div');
    hw.style.cssText=`position:absolute;bottom:${pivotBottom}px;left:0;width:${uW}px;height:0;transform-origin:50% 0%;transform:rotate(0deg);`;
    /* Segments being peeled back are in prime material (they were the multiplied-in segments) */
    const blk=makeAnimBlockMaterial(prevProduct,uW,segH,'blk-p');
    blk.style.position='absolute';blk.style.bottom='0';blk.style.left='0';
    hw.appendChild(blk); overlay.appendChild(hw); arms.push(hw);
  }
  const reversedArms=[...arms].reverse();
  reversedArms.forEach((hw,i)=>{
    setTimeout(()=>{
      gsap.to(hw, {
        rotation: 180,
        duration: phaseDur / 1000,
        ease: "power2.inOut",
        overwrite: 'auto',
        onStart: () => haptic(15),
      });
    },i*(phaseDur+pause));
  });
  setTimeout(()=>{ clearThreeOverlay('ba'); overlay.remove(); S.bStack.pop(); S.bProduct=prevProduct; stage.style.visibility='visible'; S.bAnimating=false; renderBuildTray();renderBuildStage();renderBuildLedger(); }, reversedArms.length*(phaseDur+pause)+150);
}

function checkBuildSolved(){
  const n=S.bNum;if(!n||S.bDone.has(n))return;
  S.bDone.add(n); const numEl=document.getElementById('build-numeral'); numEl.onclick=()=>goToGrid();
  setTimeout(()=>{
    showAffirm(); numEl.classList.add('celebrate'); haptic([20,25,20,25,40]);
    setTimeout(()=>{ numEl.classList.remove('celebrate'); numEl.classList.add('solved'); },1100);
  },300);
}

// INIT
S.fDone.add(1); buildDex('altar-dex-vp'); buildDex('grid-vp');
if (window.THREE) { 
  enterAltar(12);
  /* Recalibrate after first paint — layout may not be settled during script execution */
  requestAnimationFrame(() => {
    resizeThreeRoom('fa');
    calibrateOverlayPositions('fa');
    requestThreeRender();
  });
}
