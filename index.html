function enterBuild(n){
  S.bNum=n;S.bStack=[];S.bProduct=0;S.bAnimating=false;
  const numEl=document.getElementById('build-numeral');
  numEl.textContent=n;
  numEl.classList.remove('solved','celebrate');
  const isSolved=S.bDone.has(n);
  if(isSolved){numEl.classList.add('solved');}
  numEl.onclick=isSolved?()=>goToGrid():null;

  // Size units to altar — use 12-reference like factor altar
  const altar=document.getElementById('ba');
  const altarH=altar.clientHeight-50;
  const refUnitH=Math.max(6,Math.min(44,Math.floor(altarH/12)));
  S.bUnitH=refUnitH;
  S.bUnitW=Math.min(60,Math.max(36,S.bUnitH*0.85));
  S.bZoom=n<=12?1:Math.min(1,12/n);
  setZoom('bz',S.bZoom,false);

  // Position ceiling line — must account for zoom
  const ceil=document.getElementById('bceil');
  const ceilPx=n*S.bUnitH*S.bZoom;
  const ceilTop=altar.clientHeight-36-ceilPx;
  ceil.style.top=Math.max(8,ceilTop)+'px';

  buildDex('build-dex-vp');
  renderBuildStage();
  renderBuildTray();
  renderBuildLedger();
  // Make dex trinkets draggable
  setupBuildDexDrag();
}

function renderBuildStage(){
  const stage=document.getElementById('bo');stage.innerHTML='';
  if(S.bProduct===0)return;
  const uH=S.bUnitH,uW=S.bUnitW;
  const h=S.bProduct*uH;
  const el=makeBlock(S.bProduct,uW,h);
  // Undo hinge at the prev product height
  if(S.bStack.length>0){
    const prev=S.bStack[S.bStack.length-1].prevProduct;
    if(prev>0){
      const hingeY=prev*uH;
      const zone=document.createElement('div');zone.className='bundo-zone';zone.style.top=hingeY+'px';
      const mark=document.createElement('div');mark.className='bundo-mark';zone.appendChild(mark);
      zone.addEventListener('pointerdown',e=>{e.preventDefault();undoBuild();});
      el.appendChild(zone);
    }
  }
  stage.appendChild(el);
}

function renderBuildTray(){
  const tray=document.getElementById('bt');tray.innerHTML='';
  if(S.bStack.length===0){
    const hint=document.createElement('div');hint.className='bt-empty';
    tray.appendChild(hint);
    return;
  }
  S.bStack.forEach((entry,i)=>{
    const s=document.createElement('div');
    s.className='bt-trinket';
    s.textContent=entry.p;
    if(i===S.bStack.length-1){
      s.classList.add('last');
      s.style.touchAction='none';
      s.addEventListener('pointerdown',e=>{
        if(S.bAnimating)return;
        e.preventDefault();
        s.setPointerCapture(e.pointerId);
        const startY=e.clientY;
        let removed=false;
        const onMove=ev=>{
          if(ev.clientY-startY>20&&!removed){
            removed=true;
            s.removeEventListener('pointermove',onMove);
            s.removeEventListener('pointerup',onUp);
            undoBuild();
          }
        };
        const onUp=()=>{
          s.removeEventListener('pointermove',onMove);
          s.removeEventListener('pointerup',onUp);
        };
        s.addEventListener('pointermove',onMove,{passive:false});
        s.addEventListener('pointerup',onUp);
      });
    }
    tray.appendChild(s);
  });
}

function renderBuildLedger(){
  const led=document.getElementById('bl');led.innerHTML='';
  if(S.bStack.length===0)return;
  S.bStack.forEach((entry,i)=>{
    if(i>0){const x=document.createElement('span');x.className='ledger-times';x.textContent='×';led.appendChild(x);}
    const t=document.createElement('div');t.className='ledger-factor';t.textContent=entry.p;led.appendChild(t);
  });
  if(S.bStack.length>1){
    const eq=document.createElement('span');eq.className='ledger-eq';eq.textContent='=';led.appendChild(eq);
    const prod=document.createElement('div');prod.className='ledger-product';prod.textContent=S.bProduct;led.appendChild(prod);
  }
}

function setupBuildDexDrag(){
  const vp=document.getElementById('build-dex-vp');
  if(!vp)return;
  // Remove previous handler
  vp._dragHandler&&vp.removeEventListener('pointerdown',vp._dragHandler);
  delete vp._dragHandler;

  // Attach to each prime trinket individually with touch-action:none
  // This lets the viewport scroll normally while trinkets are draggable
  vp.querySelectorAll('.dex-slot[data-n]').forEach(slot=>{
    const n=parseInt(slot.dataset.n);
    if(!isPrime(n)||!S.primeDex.has(n))return;
    const trinket=slot.querySelector('.dex-trinket');
    if(!trinket)return;
    trinket.style.touchAction='none';
    trinket.style.cursor='grab';
    // Remove old listeners by cloning
    const fresh=trinket.cloneNode(true);
    fresh.style.touchAction='none';
    slot.querySelector('.dex-trinket-wrap').replaceChild(fresh,trinket);
    fresh.addEventListener('pointerdown',e=>{
      if(S.bAnimating)return;
      e.preventDefault();
      e.stopPropagation();
      fresh.setPointerCapture(e.pointerId);
      startBuildDrag(e,n,fresh);
    },{passive:false});
  });
}

function startBuildDrag(e,p,sourceEl){
  const size=Math.round(window.innerWidth*0.11);
  const dexRect=document.getElementById('build-dex-container').getBoundingClientRect();

  // Create floating trinket at finger position
  const drag=document.createElement('div');
  drag.className='dragging-trinket';
  drag.style.cssText=`width:${size}px;height:52px;font-size:13px;left:${e.clientX-size/2}px;top:${e.clientY-26}px;`;
  drag.textContent=p;
  document.body.appendChild(drag);

  // Visual feedback on source
  sourceEl.style.opacity='0.4';

  const onMove=ev=>{
    drag.style.left=(ev.clientX-size/2)+'px';
    drag.style.top=(ev.clientY-26)+'px';
  };

  const onUp=ev=>{
    sourceEl.removeEventListener('pointermove',onMove);
    sourceEl.removeEventListener('pointerup',onUp);
    sourceEl.removeEventListener('pointercancel',onUp);
    sourceEl.style.opacity='';
    drag.remove();
    // Accept drop anywhere above the dex
    if(ev.clientY<dexRect.top-10){
      placeBuildPrime(p);
    }
  };

  sourceEl.addEventListener('pointermove',onMove,{passive:true});
  sourceEl.addEventListener('pointerup',onUp);
  sourceEl.addEventListener('pointercancel',onUp);
}

function placeBuildPrime(p){
  if(S.bAnimating)return;
  const n=S.bNum;
  const prevProduct=S.bProduct;
  const newProduct=prevProduct===0?p:prevProduct*p;

  // Push to stack
  S.bStack.push({p,prevProduct});
  S.bProduct=newProduct;

  if(newProduct>n){
    // OVERSHOOT
    S.bAnimating=true;
    if(prevProduct===0){
      // First placement already overshoots — simple haptic+shatter, no animation
      haptic([60,30,60]);
      S.bStack.pop();S.bProduct=0;
      S.bAnimating=false;
      renderBuildStage();renderBuildTray();renderBuildLedger();
    } else {
      animateBuildOvershoot(prevProduct,p,newProduct,n,()=>{
        S.bStack.pop();S.bProduct=prevProduct;
        S.bAnimating=false;
        renderBuildStage();renderBuildTray();renderBuildLedger();
      });
    }
    return;
  }

  if(prevProduct===0){
    // First placement — just appear
    renderBuildStage();renderBuildTray();renderBuildLedger();
    if(newProduct===n)checkBuildSolved();
    return;
  }

  // Clone-and-hinge animation: P-1 new copies of prevProduct hinge up
  S.bAnimating=true;
  renderBuildStage();renderBuildTray();renderBuildLedger();
  animateBuildHinge(prevProduct,p,newProduct,n,()=>{
    S.bAnimating=false;
    if(newProduct===n)checkBuildSolved();
  });
}

function animateBuildHinge(prevH,p,finalH,target,cb){
  const stage=document.getElementById('bo');
  const altar=document.getElementById('ba');
  const uH=S.bUnitH,uW=S.bUnitW;
  const segH=prevH*uH;

  // Hide real stage
  stage.style.visibility='hidden';

  // Build overlay with base block + P-1 hinge copies
  const overlay=document.createElement('div');
  overlay.style.cssText=`position:absolute;bottom:36px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:50;pointer-events:none;width:${uW}px;height:${segH}px;overflow:visible;`;
  altar.appendChild(overlay);

  // Base block
  const base=makeBlock(prevH,uW,segH);
  base.style.position='absolute';base.style.bottom='0';base.style.left='0';
  overlay.appendChild(base);

  // Create P-1 hinge arms, each one stacks on top of prev
  const copies=p-1;
  const phaseDur=400,pause=60;

  let topEl=base;
  const arms=[];
  for(let i=0;i<copies;i++){
    const hw=document.createElement('div');
    hw.style.cssText=`position:absolute;bottom:${segH}px;left:0;width:${uW}px;height:0;`;
    hw.style.transformOrigin='50% 100%'; // CENTER pivot
    hw.style.transform='rotate(180deg)'; // starts folded behind
    const blk=makeBlock(prevH,uW,segH,false,false);
    blk.style.position='absolute';blk.style.bottom='0';blk.style.left='0';
    hw.appendChild(blk);
    topEl.appendChild(hw);
    arms.push(hw);
    topEl=hw;
  }

  // Animate each arm unfolding sequentially
  arms.forEach((hw,i)=>{
    setTimeout(()=>{
      hw.style.transition=`transform ${phaseDur}ms var(--ease-heavy)`;
      hw.style.transform='rotate(0deg)';
      haptic(20);
    },i*(phaseDur+pause));
  });

  const totalTime=copies*(phaseDur+pause)+200;
  setTimeout(()=>{
    overlay.remove();
    stage.style.visibility='visible';
    renderBuildStage();
    cb&&cb();
  },totalTime);
}

function animateBuildOvershoot(prevH,p,finalH,target,cb){
  const stage=document.getElementById('bo');
  const altar=document.getElementById('ba');
  const uH=S.bUnitH,uW=S.bUnitW;
  const segH=prevH*uH;
  const ceilPx=target*uH; // ceiling height in pixels from base

  stage.style.visibility='hidden';

  const overlay=document.createElement('div');
  overlay.style.cssText=`position:absolute;bottom:36px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:50;pointer-events:none;width:${uW}px;height:${segH}px;overflow:visible;`;
  altar.appendChild(overlay);

  const base=makeBlock(prevH,uW,segH);
  base.style.position='absolute';base.style.bottom='0';base.style.left='0';
  overlay.appendChild(base);

  const copies=p-1;
  const phaseDur=400,pause=60;

  let topEl=base;
  const arms=[];
  for(let i=0;i<copies;i++){
    const hw=document.createElement('div');
    hw.style.cssText=`position:absolute;bottom:${segH}px;left:0;width:${uW}px;height:0;`;
    hw.style.transformOrigin='50% 100%';
    hw.style.transform='rotate(180deg)';
    const blk=makeBlock(prevH,uW,segH,false,false);
    blk.style.position='absolute';blk.style.bottom='0';blk.style.left='0';
    hw.appendChild(blk);
    topEl.appendChild(hw);
    arms.push(hw);
    topEl=hw;
  }

  // For each arm, figure out if it clears or collides with ceiling.
  // Arm i, when fully upright, puts the top at: (i+2)*segH above base.
  // The ceiling is at ceilPx. Find which arm collides.
  let collisionArm=-1;
  let collisionAngle=0; // degrees from 180 (folded) — 0=folded, 180=upright
  for(let i=0;i<copies;i++){
    const pivotHeight=(i+1)*segH; // height of this arm's pivot above base
    const headroom=ceilPx-pivotHeight; // space between pivot and ceiling
    if(headroom>=segH){
      // This arm clears — fully upright tip at pivotHeight+segH <= ceilPx
      continue;
    }
    // Collision! The arm's tip height above pivot = segH * (1 - cos(theta))/2
    // Wait — center pivot. When rotation goes from 180° to 0°, the tip traces:
    //   At rotation R (CSS rotate), the segment hangs at angle R from vertical.
    //   Tip height above pivot = segH * cos(R in radians) ... but at 180° tip is -segH (behind/below)
    //   and at 0° tip is +segH (above). So tip above pivot = segH * cos(R_rad) where R goes 180->0.
    //   Actually for center pivot: tip above pivot = segH * cos(R_rad).
    //   At R=180°: cos(π) = -1, tip = -segH (folded down behind)
    //   At R=0°: cos(0) = 1, tip = +segH (upright)
    // Collision when pivotHeight + segH*cos(R_rad) >= ceilPx
    // cos(R_rad) >= (ceilPx - pivotHeight) / segH = headroom/segH
    // R_rad <= acos(headroom/segH)
    // CSS rotation goes from 180 toward 0, so collision rotation = acos(headroom/segH) in degrees
    const cosCollision=Math.max(-1,Math.min(1,headroom/segH));
    const collisionRotDeg=Math.acos(cosCollision)*(180/Math.PI);
    collisionArm=i;
    collisionAngle=collisionRotDeg;
    break;
  }

  // Animate safe arms fully, then animate collision arm to collision angle
  const safeCount=collisionArm>=0?collisionArm:copies;

  // Animate safe arms
  arms.forEach((hw,i)=>{
    if(i<safeCount){
      setTimeout(()=>{
        hw.style.transition=`transform ${phaseDur}ms var(--ease-heavy)`;
        hw.style.transform='rotate(0deg)';
        haptic(20);
      },i*(phaseDur+pause));
    }
  });

  if(collisionArm>=0){
    // Animate collision arm — it starts at the same time as it would normally
    const collisionDelay=collisionArm*(phaseDur+pause);
    // Calculate what fraction of the full swing gets us to collision angle
    // Full swing = 180° to 0°. Collision at collisionAngle degrees.
    // Fraction traveled = (180 - collisionAngle) / 180
    const fraction=(180-collisionAngle)/180;
    const collisionDur=Math.max(120,Math.round(phaseDur*fraction));

    setTimeout(()=>{
      const hw=arms[collisionArm];
      hw.style.transition=`transform ${collisionDur}ms var(--ease-heavy)`;
      hw.style.transform=`rotate(${collisionAngle}deg)`;
      haptic(20);

      // Shatter at the moment it reaches ceiling
      setTimeout(()=>{
        const rect=overlay.getBoundingClientRect();
        const altarEl=document.getElementById('ba');
        const altarRect=altarEl.getBoundingClientRect();
        haptic([60,30,60]);
        const fx=(rect.left+rect.width/2-altarRect.left)/altarRect.width;
        const fy=(rect.top-altarRect.top)/altarRect.height;
        canvasShatter('bz-canvas',altarEl,fx,Math.max(0.1,fy),28);
        overlay.remove();
        stage.style.visibility='visible';
        setTimeout(()=>{cb&&cb();},400);
      },collisionDur+30);
    },collisionDelay);
  }
}

function shatterBuildObelisk(){
  const stage=document.getElementById('bo');
  const blk=stage.querySelector('.blk');
  const altarEl=document.getElementById('ba');
  if(!blk||!altarEl)return;
  haptic([60,30,60]);
  const blkRect=blk.getBoundingClientRect();
  const altarRect=altarEl.getBoundingClientRect();
  const fx=(blkRect.left+blkRect.width/2-altarRect.left)/altarRect.width;
  const fy=(blkRect.top+blkRect.height*0.3-altarRect.top)/altarRect.height;
  canvasShatter('bz-canvas',altarEl,fx,Math.max(0.05,fy),28);
}

function undoBuild(){
  if(S.bAnimating||S.bStack.length===0)return;
  const entry=S.bStack[S.bStack.length-1]; // peek, don't pop yet
  const p=entry.p;
  const prevProduct=entry.prevProduct;
  const currentProduct=S.bProduct;
  const uH=S.bUnitH,uW=S.bUnitW;

  // If first trinket (prevProduct=0), just clear instantly — nothing to animate down
  if(prevProduct===0){
    S.bStack.pop();
    S.bProduct=0;
    haptic(20);
    renderBuildStage();renderBuildTray();renderBuildLedger();
    return;
  }

  S.bAnimating=true;
  haptic(20);
  const stage=document.getElementById('bo');
  const altar=document.getElementById('ba');
  const segH=prevProduct*uH;
  const copies=p-1;
  const phaseDur=350,pause=50;

  // Build overlay matching current state (full product height)
  stage.style.visibility='hidden';
  const overlay=document.createElement('div');
  overlay.style.cssText=`position:absolute;bottom:36px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:50;pointer-events:none;width:${uW}px;height:${segH}px;overflow:visible;`;
  altar.appendChild(overlay);

  // Base block at prevProduct height
  const base=makeBlock(prevProduct,uW,segH);
  base.style.position='absolute';base.style.bottom='0';base.style.left='0';
  overlay.appendChild(base);

  // Arms start UPRIGHT (rotate 0) — they will fold DOWN (rotate 180)
  let topEl=base;
  const arms=[];
  for(let i=0;i<copies;i++){
    const hw=document.createElement('div');
    hw.style.cssText=`position:absolute;bottom:${segH}px;left:0;width:${uW}px;height:0;`;
    hw.style.transformOrigin='50% 100%';
    hw.style.transform='rotate(0deg)'; // start upright
    const blk=makeBlock(prevProduct,uW,segH,false,false);
    blk.style.position='absolute';blk.style.bottom='0';blk.style.left='0';
    hw.appendChild(blk);
    topEl.appendChild(hw);
    arms.push(hw);
    topEl=hw;
  }

  // Fold DOWN — reverse order (innermost first so outermost follows)
  const reversedArms=[...arms].reverse();
  reversedArms.forEach((hw,i)=>{
    setTimeout(()=>{
      hw.style.transition=`transform ${phaseDur}ms var(--ease-heavy)`;
      hw.style.transform='rotate(180deg)';
      haptic(15);
    },i*(phaseDur+pause));
  });

  const totalTime=reversedArms.length*(phaseDur+pause)+150;
  setTimeout(()=>{
    overlay.remove();
    S.bStack.pop();
    S.bProduct=prevProduct;
    stage.style.visibility='visible';
    S.bAnimating=false;
    renderBuildStage();renderBuildTray();renderBuildLedger();
  },totalTime);
}

function checkBuildSolved(){
  const n=S.bNum;if(!n||S.bDone.has(n))return;
  S.bDone.add(n);
  const numEl=document.getElementById('build-numeral');
  numEl.onclick=()=>goToGrid();
  setTimeout(()=>{
    showAffirm();
    numEl.classList.add('celebrate');
    haptic([20,25,20,25,40]);
    setTimeout(()=>{
      numEl.classList.remove('celebrate');
      numEl.classList.add('solved');
    },1100);
  },300);
}

// ════════════════════════════════════════
// PINCH-TO-ZOOM on altar areas
// ════════════════════════════════════════
function setupPinchZoom(altarId,zoomId,getDefaultZoom){
  const altar=document.getElementById(altarId);
  if(!altar)return;
  let activeTouches=[];
  let baseZoom=1,baseDist=0;

  altar.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      activeTouches=[e.touches[0],e.touches[1]];
      baseDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const el=document.getElementById(zoomId);
      const cur=el.style.transform.match(/scale\(([\d.]+)\)/);
      baseZoom=cur?parseFloat(cur[1]):getDefaultZoom();
    }
  },{passive:false});

  altar.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ratio=dist/baseDist;
      const newZoom=Math.max(0.15,Math.min(3,baseZoom*ratio));
      const el=document.getElementById(zoomId);
      el.style.transition='none';
      el.style.transform=`translateX(-50%) scale(${newZoom})`;
    }
  },{passive:false});

  altar.addEventListener('touchend',e=>{
    if(e.touches.length<2&&activeTouches.length===2){
      activeTouches=[];
      // After pinch release, don't snap back — let student explore
      // Auto-zoom reasserts on unspool or room entry
    }
  });
}

// ════════════════════════════════════════
// THE 1 ROOM — special mirror handling
// ════════════════════════════════════════
// 1 is handled in enterAltar: isPrime(1)=false, but we pre-solve it.
// The obelisk for 1 should show as the mirror trinket material.

// ════════════════════════════════════════
// CANVAS PARTICLE ENGINE
// ════════════════════════════════════════
const _cvState={};

function _initCanvas(canvasId){
  if(_cvState[canvasId])return _cvState[canvasId];
  const el=document.getElementById(canvasId);
  if(!el)return null;
  const parent=el.parentElement;
  const dpr=window.devicePixelRatio||1;
  const w=parent.clientWidth, h=parent.clientHeight;
  el.width=w*dpr; el.height=h*dpr;
  el.style.width=w+'px'; el.style.height=h+'px';
  const ctx=el.getContext('2d');
  ctx.scale(dpr,dpr);
  const state={el,ctx,w,h,particles:[],raf:null};
  _cvState[canvasId]=state;
  return state;
}

function canvasShatter(canvasId, altarEl, fracX, fracY, count=24){
  // fracX/fracY are 0-1 fractions of the altar element dimensions
  const cv=_initCanvas(canvasId);
  if(!cv)return;
  // Refresh dimensions in case layout changed
  const dpr=window.devicePixelRatio||1;
  const w=altarEl.clientWidth, h=altarEl.clientHeight;
  cv.w=w; cv.h=h;
  cv.el.width=w*dpr; cv.el.height=h*dpr;
  cv.el.style.width=w+'px'; cv.el.style.height=h+'px';
  cv.ctx.setTransform(dpr,0,0,dpr,0,0);

  const cx=w*fracX, cy=h*fracY;
  // Chunky Minecraft-style palette — brushed aluminum fragments + prime amber sparks
  const colors=[
    'rgba(220,222,226,0.95)','rgba(195,198,204,0.9)','rgba(240,241,243,0.95)',
    'rgba(170,173,180,0.85)','rgba(255,200,100,0.8)','rgba(255,255,255,0.9)',
    'rgba(150,153,160,0.8)'
  ];
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*16+6;
    cv.particles.push({
      x:cx+(Math.random()-0.5)*30,
      y:cy+(Math.random()-0.5)*20,
      vx:Math.cos(angle)*speed*(0.6+Math.random()*0.8),
      vy:Math.sin(angle)*speed*(0.6+Math.random()*0.8)-8,
      size:Math.random()*9+4,
      angle:Math.random()*Math.PI*2,
      spin:(Math.random()-0.5)*0.35,
      life:1.0,
      decay:Math.random()*0.018+0.012,
      color:colors[Math.floor(Math.random()*colors.length)]
    });
  }
  if(!cv.raf)_runParticles(cv);
}

function _runParticles(cv){
  const {ctx,w,h}=cv;
  ctx.clearRect(0,0,w,h);
  cv.particles=cv.particles.filter(p=>p.life>0);
  for(const p of cv.particles){
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.55; // gravity
    p.vx*=0.98; // drag
    p.angle+=p.spin;
    p.life-=p.decay;
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);
    ctx.globalAlpha=Math.max(0,p.life*p.life); // quadratic fade = stays solid then drops fast
    ctx.fillStyle=p.color;
    // Chunky square fragments
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    // Edge highlight for 3D feel
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.25);
    ctx.restore();
  }
  if(cv.particles.length>0){
    cv.raf=requestAnimationFrame(()=>_runParticles(cv));
  } else {
    ctx.clearRect(0,0,w,h);
    cv.raf=null;
  }
}
