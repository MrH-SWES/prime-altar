<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prime Altar | Math Things.</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0a0a0c;--spring:cubic-bezier(0.34,1.56,0.64,1);--ease-heavy:cubic-bezier(0.15,0.6,0.3,1.0);--green:#01B069;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Lexend',sans-serif;background:var(--bg);height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;color:#fff;user-select:none;}

    /* ═══ SCREENS ═══ */
    .screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity 0.4s ease;background:var(--bg);}
    .screen.hidden{opacity:0;pointer-events:none;}

    /* ═══ GRID SCREEN ═══ */
    .grid-screen-header{display:flex;justify-content:center;align-items:center;padding:12px 14px 8px;flex-shrink:0;}
    .logo{font-weight:900;font-size:16px;opacity:0.35;letter-spacing:-0.03em;}
    .logo-bead{display:inline-block;width:0.22em;height:0.22em;margin-left:0.04em;margin-bottom:0.08em;border-radius:50%;background:radial-gradient(circle at 33% 28%,rgba(255,255,255,0.92) 0%,rgba(255,255,255,0.3) 40%,transparent 65%),radial-gradient(circle at 67% 72%,rgba(0,0,0,0.15) 0%,transparent 55%),linear-gradient(135deg,#efefef,#d0d0d0,#a8a8a8,#c0c0c0,#e0e0e0);box-shadow:inset 1px 1px 2px rgba(255,255,255,0.8),inset -1px -1px 2px rgba(0,0,0,0.2),0 2px 4px rgba(0,0,0,0.3);}
    .num-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:6px 8px;flex:1;align-content:start;overflow-y:auto;}
    .nc{aspect-ratio:1;border-radius:8px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;
      /* Stone — heavy, unmined, begging to be broken */
      background:linear-gradient(145deg,rgba(22,22,26,0.9),rgba(14,14,17,0.95));
      box-shadow:inset 0 3px 6px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.04);}
    .nc.avail{
      background:linear-gradient(145deg,rgba(26,26,31,0.92),rgba(16,16,20,0.96));
      box-shadow:inset 0 3px 6px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);}
    .nc.avail:active{transform:scale(0.93);}
    .nc.done{
      /* Glassy reliquary — broken open, now holds the trinkets */
      background:linear-gradient(145deg,rgba(35,35,44,0.7),rgba(20,20,28,0.85));
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 2px 8px rgba(0,0,0,0.3);
      border:1px solid rgba(255,255,255,0.06);}
    .nc.locked{opacity:0.04;pointer-events:none;}
    .nc.done::after{content:'';position:absolute;width:4px;height:4px;border-radius:50%;
      background:var(--green);top:4px;right:4px;box-shadow:0 0 4px var(--green);}
    /* Unsolved: number centered */
    .nc-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:16px;color:rgba(255,255,255,0.45);}
    /* Solved: number top-left small */
    .nc-label{position:absolute;top:4px;left:5px;font-weight:700;font-size:9px;
      color:rgba(255,255,255,0.3);line-height:1;z-index:2;}
    /* Mini trinket grid */
    .nc-trinkets{position:absolute;left:3px;right:3px;top:16px;bottom:3px;
      display:flex;flex-wrap:wrap;align-content:flex-start;gap:1px;overflow:hidden;}
    .nc-t{border-radius:2px;display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:5.5px;flex-shrink:0;width:14px;height:16px;}
    .nc-t.nc-tc{background:linear-gradient(135deg,#d8d8da,#b0b0b4);
      color:rgba(50,50,55,0.85);border:0.5px solid rgba(255,255,255,0.35);}
    .nc-t.nc-tp{background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(240,242,248,0.07));
      border:0.5px solid rgba(255,255,255,0.22);color:rgba(255,220,160,0.9);
      box-shadow:0 0 3px rgba(255,180,80,0.25);text-shadow:0 0 3px rgba(255,195,100,0.7);}
    .nc-t.nc-tm{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.18);font-style:italic;}
    .nc-overflow{font-size:5px;color:rgba(255,255,255,0.2);padding:1px;}

    /* ═══ ALTAR SCREEN ═══ */
    .altar-header{display:flex;justify-content:center;align-items:center;padding:10px 14px;flex-shrink:0;position:relative;z-index:10;}
    .altar-numeral{font-weight:900;font-size:52px;letter-spacing:-2px;color:rgba(255,255,255,0.15);line-height:1;position:relative;}

    /* Ambient breathing pulse — always on when solved */
    .altar-numeral.solved{color:#01B069;animation:solvedBreathe 5s ease-in-out infinite;cursor:pointer;}
    @keyframes solvedBreathe{
      0%{color:rgba(1,176,105,0.25);text-shadow:0 0 4px rgba(1,176,105,0.1),0 0 8px rgba(1,176,105,0.05);}
      50%{color:#34c98a;text-shadow:0 0 8px rgba(52,185,120,0.85),0 0 22px rgba(1,176,105,0.55),0 0 50px rgba(1,176,105,0.25),0 0 90px rgba(1,176,105,0.1);}
      100%{color:rgba(1,176,105,0.25);text-shadow:0 0 4px rgba(1,176,105,0.1),0 0 8px rgba(1,176,105,0.05);}
    }

    /* Celebration — green circle blooms out then contracts revealing green numeral */
    .altar-numeral.celebrate{animation:none;color:rgba(255,255,255,0.15);}
    .altar-numeral.celebrate::after{
      content:'';
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%) scale(0);
      width:180px;height:180px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(52,185,120,0.55) 0%,rgba(1,176,105,0.25) 45%,transparent 75%);
      animation:celebBloom 1.1s cubic-bezier(0.2,0,0.4,1) forwards;
      pointer-events:none;
      z-index:-1;
    }
    @keyframes celebBloom{
      0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
      55%{transform:translate(-50%,-50%) scale(1.8);opacity:1;}
      100%{transform:translate(-50%,-50%) scale(0.6);opacity:0;}
    }

    /* ═══ ALTAR — deep dark room ═══ */
    .altar{flex:1;position:relative;overflow:hidden;min-height:0;
      background:radial-gradient(ellipse 80% 50% at 50% 85%,rgba(18,18,24,1),rgba(8,8,10,1));}
    .altar::before{content:'';position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:140px;height:110%;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.012) 20%,rgba(255,255,255,0.03) 55%,rgba(255,255,255,0.01) 80%,transparent);filter:blur(20px);pointer-events:none;}
    /* ═══ PEDESTAL — wide flat stage, never scales ═══ */
    .altar-pedestal{position:absolute;bottom:0;left:0;right:0;height:36px;z-index:2;}
    .ped-platform{position:absolute;bottom:16px;left:10%;right:10%;height:6px;
      background:linear-gradient(180deg,#2a2a2e,#1a1a1e);
      border-radius:2px;
      box-shadow:0 1px 0 rgba(255,255,255,0.04),0 -1px 0 rgba(0,0,0,0.3);}
    .ped-step1{position:absolute;bottom:8px;left:5%;right:5%;height:8px;
      border-radius:50%;
      background:conic-gradient(from 45deg,#0d0d0f 0%,#28282b 15%,#0d0d0f 30%,#1a1a1d 50%,#0d0d0f 70%,#28282b 85%,#0d0d0f 100%);
      box-shadow:0 2px 0 #333,0 3px 0 #222,0 8px 20px rgba(0,0,0,0.5);}
    .ped-step2{position:absolute;bottom:0;left:0;right:0;height:10px;
      border-radius:50%;
      background:conic-gradient(from 45deg,#0d0d0f 0%,#28282b 15%,#0d0d0f 30%,#1a1a1d 50%,#0d0d0f 70%,#28282b 85%,#0d0d0f 100%);
      box-shadow:0 2px 0 #333,0 3px 0 #222,0 15px 30px rgba(0,0,0,0.6);}

    /* ═══ ZOOM WRAPPER ═══ */
    .seg-zoom{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:5;}
    .seg-zoom.folded{transform:none;}
    .seg-stage{display:flex;align-items:flex-end;gap:3px;}

    /* ═══ BLOCKS ═══ */
    .blk{border-radius:5px 5px 2px 2px;position:relative;overflow:visible;flex-shrink:0;}
    .blk-c{background:repeating-linear-gradient(180deg,rgba(255,255,255,0.04) 0px,transparent 1px,transparent 2px),linear-gradient(90deg,rgba(0,0,0,0.18) 0%,rgba(255,255,255,0.08) 10%,rgba(255,255,255,0.02) 28%,rgba(0,0,0,0.03) 50%,rgba(255,255,255,0.05) 72%,rgba(255,255,255,0.1) 90%,rgba(0,0,0,0.12) 100%),linear-gradient(135deg,#e0e0e2,#c0c0c4,#9a9aa0,#b0b0b5,#d0d0d4);box-shadow:inset 2px 2px 4px rgba(255,255,255,0.4),inset -2px -2px 4px rgba(0,0,0,0.12),3px 6px 18px rgba(0,0,0,0.45);}
    .blk-c::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(180deg,rgba(255,255,255,0.5),rgba(255,255,255,0.1),transparent);border-radius:5px 5px 0 0;}
    .blk-m{border-radius:4px;overflow:hidden;
      background:linear-gradient(135deg,
        rgba(255,255,255,0.88) 0%,rgba(215,225,232,0.65) 28%,
        rgba(175,188,200,0.45) 50%,rgba(198,210,222,0.6) 70%,
        rgba(238,244,248,0.72) 100%);
      border:1px solid rgba(255,255,255,0.28);
      border-bottom:1px solid rgba(70,80,95,0.45);
      border-right:1px solid rgba(70,80,95,0.32);
      box-shadow:inset 1px 1px 4px rgba(255,255,255,0.7),inset -1px -1px 4px rgba(0,0,0,0.18),
        3px 6px 18px rgba(0,0,0,0.45);}
    /* Left face panel */
    .blk-m::before{content:'';position:absolute;top:0;left:0;width:42%;height:100%;
      background:linear-gradient(180deg,rgba(148,160,174,0.55) 0%,rgba(112,124,138,0.4) 50%,rgba(142,154,168,0.52) 100%);
      border-right:1px solid rgba(255,255,255,0.2);}
    .n-mirror{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      font-weight:300;letter-spacing:-1px;font-style:italic;
      color:rgba(55,65,78,0.35);text-shadow:0 1px 2px rgba(255,255,255,0.6);
      z-index:2;}
    .blk-p{border-radius:6px;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.08),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.25);
      box-shadow:
        inset 0 0 35px rgba(255,200,120,0.2),
        inset 0 0 70px rgba(255,160,60,0.1),
        0 0 25px rgba(255,180,80,0.15),
        0 0 60px rgba(255,150,50,0.1),
        3px 6px 18px rgba(0,0,0,0.25);
      position:relative;overflow:visible;}
    .blk-p::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(180deg,rgba(255,255,255,0.55),transparent);border-radius:6px 6px 0 0;}
    .blk-p::after{content:'';position:absolute;inset:-8px;border-radius:12px;
      background:radial-gradient(ellipse at 50% 50%,rgba(255,180,80,0.07) 0%,rgba(255,140,40,0.03) 40%,transparent 70%);
      pointer-events:none;}
    .n-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:900;letter-spacing:-1px;color:rgba(100,100,105,0.45);text-shadow:0 1px 0 rgba(255,255,255,0.3),0 -1px 0 rgba(0,0,0,0.15);}
    .n-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:900;letter-spacing:-1px;z-index:2;
      color:#fff;
      text-shadow:
        0 0 5px #fff,
        0 0 12px rgba(255,242,225,1),
        0 0 24px rgba(255,215,155,0.98),
        0 0 48px rgba(255,185,85,0.85),
        0 0 80px rgba(255,155,45,0.65),
        0 0 125px rgba(255,125,15,0.45),
        0 0 180px rgba(255,95,0,0.28),
        0 0 250px rgba(255,65,0,0.14);}
    .n-radiance{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200%;height:200%;border-radius:50%;
      background:radial-gradient(circle,rgba(255,220,140,0.28) 0%,rgba(255,180,80,0.13) 25%,rgba(255,140,40,0.05) 50%,transparent 75%);
      pointer-events:none;z-index:1;}

    /* ═══ HANDLE — just the segment edge, no rectangle ═══ */
    .handle{position:absolute;top:0;left:0;right:0;height:3px;z-index:30;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 20%,rgba(255,255,255,0.28) 50%,rgba(255,255,255,0.18) 80%,transparent);
      border-radius:2px 2px 0 0;cursor:grab;touch-action:none;pointer-events:all;}
    /* Large invisible hit zone extending upward away from obelisk */
    .handle::before{content:'';position:absolute;top:-44px;left:-8px;right:-8px;height:52px;}
    .handle.inverted{top:auto;bottom:0;border-radius:0 0 2px 2px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 20%,rgba(255,255,255,0.28) 50%,rgba(255,255,255,0.18) 80%,transparent);}
    .handle.inverted::before{top:auto;bottom:-44px;}
    /* Pulse: edge glows green */
    .handle.pulse{animation:handlePulse 5s ease-in-out infinite;}
    @keyframes handlePulse{
      0%{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1) 20%,rgba(255,255,255,0.18) 50%,rgba(255,255,255,0.1) 80%,transparent);}
      50%{background:linear-gradient(90deg,transparent,rgba(1,176,105,0.4) 15%,rgba(52,201,138,0.7) 50%,rgba(1,176,105,0.4) 85%,transparent);
        box-shadow:0 0 8px rgba(1,176,105,0.4),0 0 16px rgba(1,176,105,0.2);}
      100%{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1) 20%,rgba(255,255,255,0.18) 50%,rgba(255,255,255,0.1) 80%,transparent);}
    }
    .handle-caret{display:none;}
    .hm.idle{animation:hingeidle 5s ease-in-out infinite;}
    @keyframes hingeidle{
      0%{background:linear-gradient(180deg,rgba(255,255,255,0.18),rgba(0,0,0,0.12));box-shadow:0 1px 1px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.2);}
      50%{background:linear-gradient(180deg,rgba(1,176,105,0.35),rgba(1,176,105,0.1));box-shadow:0 0 6px rgba(1,176,105,0.4),0 0 14px rgba(1,176,105,0.15),inset 0 1px 2px rgba(52,185,120,0.25);}
      100%{background:linear-gradient(180deg,rgba(255,255,255,0.18),rgba(0,0,0,0.12));box-shadow:0 1px 1px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.2);}
    }

    /* ═══ HINGE ═══ */
    .hz{position:absolute;left:-4px;right:-4px;height:32px;z-index:25;cursor:grab;display:flex;align-items:center;transform:translateY(-50%);touch-action:none;}
    .hm{width:50%;height:4px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,0.18),rgba(0,0,0,0.12));border-radius:3px;box-shadow:0 1px 1px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.2);transition:all 0.12s;}
    .hz:active .hm{background:linear-gradient(180deg,rgba(255,200,120,0.5),rgba(200,150,60,0.3));box-shadow:0 0 6px rgba(255,180,80,0.4);}

    /* ═══ FACTOR TRAY — warm amber-tinted shelf ═══ */
    .f-tray{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 12px;flex-wrap:wrap;
      background:linear-gradient(180deg,rgba(42,36,26,0.99),rgba(30,25,18,0.99));
      border-top:1px solid rgba(255,180,80,0.1);
      border-bottom:1px solid rgba(0,0,0,0.6);
      min-height:54px;flex-shrink:0;
      box-shadow:inset 0 1px 0 rgba(255,180,80,0.06),inset 0 -2px 16px rgba(0,0,0,0.5);}
    /* Factor tray slots — match dex trinket style */
    .fs{width:36px;height:44px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;transition:all 0.3s var(--spring);flex-shrink:0;}
    .fs.empty{border:1px dashed rgba(255,255,255,0.06);color:transparent;}
    .fs.mirror{
      background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.15);font-style:italic;}
    .fs.starter{
      background:repeating-linear-gradient(180deg,rgba(255,255,255,0.03) 0px,transparent 1px,transparent 2px),linear-gradient(135deg,rgba(200,200,205,0.18),rgba(160,160,165,0.1));
      border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);}
    .fs.fc{
      background:repeating-linear-gradient(180deg,rgba(255,255,255,0.04) 0px,transparent 1px,transparent 2px),linear-gradient(135deg,#e0e0e2,#c0c0c4,#9a9aa0,#b0b0b5);
      border:1px solid rgba(255,255,255,0.15);color:rgba(60,60,65,0.9);
      box-shadow:inset 2px 2px 4px rgba(255,255,255,0.4),inset -2px -2px 4px rgba(0,0,0,0.12),0 2px 6px rgba(0,0,0,0.3);
      animation:sl 0.4s var(--spring);}
    .fs.fp{
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.07),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.22);
      color:#fff;
      box-shadow:inset 0 0 16px rgba(255,200,120,0.18),inset 0 0 32px rgba(255,160,60,0.09),0 0 12px rgba(255,180,80,0.14),0 0 28px rgba(255,150,50,0.08);
      text-shadow:0 0 4px #fff,0 0 10px rgba(255,230,180,0.95),0 0 20px rgba(255,190,90,0.8),0 0 36px rgba(255,150,45,0.55);
      animation:spl 0.6s var(--spring);}
    @keyframes sl{0%{transform:scale(0) rotate(-10deg);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);}}
    @keyframes spl{0%{transform:scale(0);}50%{transform:scale(1.2);box-shadow:0 0 30px rgba(255,180,80,0.3);}100%{transform:scale(1);}}
    @keyframes primePulse{
      0%{opacity:0;box-shadow:inset 0 0 10px rgba(255,255,255,0.1),0 0 0px rgba(255,220,160,0.0);}
      30%{opacity:0.6;box-shadow:inset 0 0 30px rgba(255,255,255,0.25),0 0 40px rgba(255,200,120,0.12);}
      60%{opacity:1;box-shadow:inset 0 0 50px rgba(255,255,255,0.45),0 0 90px rgba(255,200,120,0.3),0 0 160px rgba(255,180,80,0.18);}
      100%{opacity:1;}
    }
    .blk-p-reveal{animation:primePulse 1.2s ease-out forwards;}
    .n-glow-reveal{opacity:0;animation:nReveal 0.4s ease-out 0.5s forwards;}
    @keyframes nReveal{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7);}60%{transform:translate(-50%,-50%) scale(1.08);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
    .n-stamp-reveal{animation:nReveal 0.25s ease-out forwards;}

    /* ═══ PRIME DEX — Uniform Trinkets ═══ */
    .dex-container{flex-shrink:0;
      background:linear-gradient(180deg,rgba(8,10,18,0.99),rgba(5,7,14,0.99));
      border-top:1px solid rgba(80,100,200,0.12);
      position:relative;overflow:hidden;height:88px;
      box-shadow:inset 0 1px 0 rgba(100,130,255,0.06);}
    .dex-viewport{height:100%;overflow-x:scroll;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;align-items:center;
      padding-left:calc(10vw);padding-right:20vw;
      scroll-snap-type:x proximity;}
    .dex-viewport::-webkit-scrollbar{display:none;}
    /* 7 slots visible, each slot 14vw */
    .dex-slot{flex-shrink:0;width:14vw;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;}
    .dex-num{font-size:6px;font-weight:600;color:rgba(255,255,255,0.05);}
    .dex-slot.has-prime .dex-num{color:rgba(255,200,120,0.25);}
    /* Trinket wrap — fixed size, no dynamic height */
    .dex-trinket-wrap{width:11vw;height:52px;position:relative;display:flex;align-items:stretch;justify-content:center;}
    /* Prime trinket — uniform size */
    .dex-trinket{width:100%;height:100%;border-radius:4px;position:relative;overflow:visible;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.06),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.22);
      box-shadow:
        inset 0 0 16px rgba(255,200,120,0.18),
        inset 0 0 32px rgba(255,160,60,0.09),
        0 0 12px rgba(255,180,80,0.14),
        0 0 28px rgba(255,150,50,0.08);
      display:flex;align-items:center;justify-content:center;}
    .dex-trinket .dt-num{font-weight:900;font-size:13px;z-index:1;white-space:nowrap;
      color:#fff;
      text-shadow:0 0 4px #fff,0 0 10px rgba(255,230,180,0.95),0 0 20px rgba(255,190,90,0.8),0 0 36px rgba(255,150,45,0.55);}
    .dex-trinket .dt-radiance{position:absolute;inset:-4px;border-radius:6px;
      background:radial-gradient(circle,rgba(255,200,120,0.12) 0%,rgba(255,160,60,0.04) 50%,transparent 75%);
      pointer-events:none;}
    /* Mirror cube (1) — three-face mirrored look */
    .dex-mirror{width:100%;height:100%;border-radius:3px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,
        rgba(255,255,255,0.88) 0%,rgba(215,225,232,0.65) 28%,
        rgba(175,188,200,0.45) 50%,rgba(198,210,222,0.6) 70%,
        rgba(238,244,248,0.72) 100%);
      border:1px solid rgba(255,255,255,0.28);
      border-bottom:1px solid rgba(70,80,95,0.45);
      border-right:1px solid rgba(70,80,95,0.32);
      box-shadow:inset 1px 1px 3px rgba(255,255,255,0.65),inset -1px -1px 3px rgba(0,0,0,0.18),
        0 2px 8px rgba(0,0,0,0.45),0 0 1px rgba(255,255,255,0.22);
      display:flex;align-items:center;justify-content:center;}
    .dex-mirror::before{content:'';position:absolute;top:0;left:0;width:45%;height:100%;
      background:linear-gradient(180deg,rgba(155,168,180,0.52) 0%,rgba(118,130,142,0.38) 50%,rgba(148,160,172,0.48) 100%);
      border-right:1px solid rgba(255,255,255,0.18);}
    .dex-mirror::after{content:'';position:absolute;top:0;right:0;width:40%;height:100%;
      background:linear-gradient(180deg,rgba(195,208,222,0.48) 0%,rgba(165,178,195,0.32) 50%,rgba(185,198,215,0.42) 100%);}
    .dex-mirror .dt-num{font-weight:300;font-size:11px;font-style:italic;
      color:rgba(55,65,78,0.38);text-shadow:0 1px 1px rgba(255,255,255,0.55);
      z-index:2;position:relative;letter-spacing:-0.5px;}
    .dex-trinket.new-cap{animation:dcap 0.6s var(--spring);}
    @keyframes dcap{0%{transform:scale(0);opacity:0;}50%{transform:scale(1.15);box-shadow:0 0 20px rgba(255,180,80,0.5);}100%{transform:scale(1);opacity:1;}}

    /* Trinket drop — flies from altar down into dex */
    .trinket-drop{position:fixed;z-index:9000;pointer-events:none;border-radius:4px;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.06),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.25);
      box-shadow:inset 0 0 15px rgba(255,200,120,0.15),0 0 20px rgba(255,180,80,0.15),0 0 50px rgba(255,140,40,0.08);
      display:flex;align-items:center;justify-content:center;
      font-family:'Lexend',sans-serif;font-weight:900;color:#fff;
      text-shadow:0 0 4px #fff,0 0 12px rgba(255,210,150,0.9),0 0 25px rgba(255,180,80,0.6);}

    /* Dex spotlight — dims non-target slots */
    .dex-slot.dimmed{opacity:0.12;transition:opacity 0.3s ease;}
    .dex-slot.spotlight{transition:opacity 0.3s ease;}

    /* Dex landing flash */
    .dex-slot.land-flash .dex-trinket-wrap{animation:landFlash 0.5s ease-out;}
    @keyframes landFlash{0%{filter:brightness(1);}25%{filter:brightness(2.5) saturate(1.5);}100%{filter:brightness(1);}}

    /* Screen fade overlay */
    .fade-overlay{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:8000;transition:opacity 0.4s ease;}
    .fade-overlay.fading{opacity:1;}

    /* ═══ GRID MODE TOGGLE ═══ */
    .grid-mode-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:8px;padding:2px;margin-top:6px;}
    .gmt-btn{width:44px;height:32px;border-radius:6px;border:none;background:transparent;
      cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;opacity:0.3;}
    .gmt-btn.active{background:rgba(255,255,255,0.07);opacity:1;}
    .gmt-btn svg{width:20px;height:20px;}

    /* ═══ BUILD CALENDAR CELLS ═══ */
    .nc-build{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1px;padding:1px;}
    .nc-trinket{width:12px;height:14px;border-radius:2px;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.06),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:inset 0 0 6px rgba(255,200,120,0.12),0 0 4px rgba(255,180,80,0.1),0 0 10px rgba(255,150,50,0.06);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:7px;line-height:1;
      color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(255,200,120,0.8),0 0 10px rgba(255,160,60,0.4);}
    /* Prime-specific glow colors for build fingerprints */
    .nc-trinket.p2{color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(255,200,120,0.9),0 0 10px rgba(255,160,60,0.5);
      box-shadow:inset 0 0 6px rgba(255,200,120,0.15),0 0 5px rgba(255,180,80,0.12);}
    .nc-trinket.p3{color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(140,180,255,0.9),0 0 10px rgba(100,140,255,0.5);
      box-shadow:inset 0 0 6px rgba(140,180,255,0.15),0 0 5px rgba(100,140,255,0.12);}
    .nc-trinket.p5{color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(120,240,140,0.9),0 0 10px rgba(80,200,100,0.5);
      box-shadow:inset 0 0 6px rgba(120,240,140,0.15),0 0 5px rgba(80,200,100,0.12);}
    .nc-trinket.p7{color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(255,160,220,0.9),0 0 10px rgba(240,120,200,0.5);
      box-shadow:inset 0 0 6px rgba(255,160,220,0.15),0 0 5px rgba(240,120,200,0.12);}
    .nc-trinket.p11{color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(255,220,100,0.9),0 0 10px rgba(255,200,60,0.5);
      box-shadow:inset 0 0 6px rgba(255,220,100,0.15),0 0 5px rgba(255,200,60,0.12);}
    .nc-trinket.p13{color:#fff;text-shadow:0 0 2px #fff,0 0 5px rgba(180,140,255,0.9),0 0 10px rgba(150,100,255,0.5);

    .nc-mirror{width:12px;height:14px;border-radius:2px;
      background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));

      display:flex;align-items:center;justify-content:center;

      color:rgba(255,255,255,0.15);}
    .nc-composite{width:12px;height:14px;border-radius:2px;
      background:linear-gradient(135deg,rgba(190,190,195,0.2),rgba(150,150,155,0.1));
      border:1px solid rgba(255,255,255,0.06);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:6px;line-height:1;
      color:rgba(255,255,255,0.3);}

    /* ═══ BUILD TRAY — draggable trinket targets ═══ */
    .build-tray-area{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 12px;flex-wrap:wrap;
      background:linear-gradient(180deg,rgba(42,36,26,0.99),rgba(30,25,18,0.99));
      border-top:1px solid rgba(255,180,80,0.1);
      border-bottom:1px solid rgba(0,0,0,0.6);
      min-height:54px;flex-shrink:0;
      box-shadow:inset 0 1px 0 rgba(255,180,80,0.06),inset 0 -2px 16px rgba(0,0,0,0.5);}
    .bt-trinket{width:36px;height:44px;border-radius:5px;display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:13px;cursor:pointer;transition:all 0.2s var(--spring);
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.07),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.22);
      color:rgba(255,220,160,0.95);
      box-shadow:inset 0 0 12px rgba(255,200,120,0.15),0 0 10px rgba(255,180,80,0.15);
      text-shadow:0 0 6px rgba(255,195,100,0.8),0 0 14px rgba(255,170,60,0.4);}
    .bt-trinket:active{transform:scale(0.9);opacity:0.6;}
    .bt-trinket.last{box-shadow:inset 0 0 12px rgba(255,200,120,0.15),0 0 10px rgba(255,180,80,0.15),0 0 0 2px rgba(255,100,80,0.3);}
    .bt-empty{width:36px;height:44px;border-radius:5px;border:1px dashed rgba(255,180,80,0.1);}

    /* ═══ BUILD LEDGER — sits between altar and tray ═══ */
    .build-ledger{display:flex;align-items:center;justify-content:center;gap:4px;padding:5px 8px;min-height:30px;flex-shrink:0;flex-wrap:wrap;
      background:rgba(20,16,12,0.98);
      border-top:1px solid rgba(0,0,0,0.5);}
    .ledger-factor{font-weight:900;font-size:13px;color:rgba(255,220,160,0.7);text-shadow:0 0 4px rgba(255,195,100,0.3);}
    .ledger-times{font-size:9px;color:rgba(255,255,255,0.15);font-weight:600;}
    .ledger-eq{font-size:10px;color:rgba(255,255,255,0.2);font-weight:700;margin:0 2px;}
    .ledger-product{font-weight:900;font-size:13px;color:rgba(255,255,255,0.5);}

    /* ═══ CEILING LINE ═══ */
    .ceil-line{position:absolute;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),rgba(255,255,255,0.12),rgba(255,255,255,0.08),transparent);pointer-events:none;z-index:6;opacity:0.6;}

    /* ═══ BUILD UNDO HINGE ═══ */
    .bundo-zone{position:absolute;left:-4px;right:-4px;height:28px;z-index:25;cursor:pointer;display:flex;align-items:center;transform:translateY(-50%);touch-action:none;}
    .bundo-mark{width:40%;height:3px;margin:0 auto;background:linear-gradient(180deg,rgba(255,100,80,0.5),rgba(200,60,40,0.3));border-radius:2px;box-shadow:0 0 5px rgba(255,80,60,0.3);transition:all 0.12s;}
    .bundo-zone:active .bundo-mark{background:rgba(255,80,60,0.8);box-shadow:0 0 8px rgba(255,80,60,0.6);}

    /* ═══ SHATTER ANIMATION ═══ */
    /* ═══ SHATTER CANVAS ═══ */
    .shatter-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:100;}
    /* ═══ DRAGGING TRINKET ═══ */
    .dragging-trinket{position:fixed;z-index:9500;pointer-events:none;border-radius:4px;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.06),rgba(255,255,255,0.1));
      border:1px solid rgba(255,255,255,0.3);
      box-shadow:inset 0 0 15px rgba(255,200,120,0.15),0 0 25px rgba(255,180,80,0.2),0 0 50px rgba(255,140,40,0.1),0 8px 24px rgba(0,0,0,0.4);
      display:flex;align-items:center;justify-content:center;
      font-family:'Lexend',sans-serif;font-weight:900;
      color:#fff;text-shadow:0 0 4px #fff,0 0 12px rgba(255,210,150,0.9),0 0 25px rgba(255,180,80,0.6);
      transition:transform 0.1s ease;}
  </style>
</head>
<body>

<!-- FADE OVERLAY for screen transitions -->
<div class="fade-overlay" id="fade-overlay"></div>

<!-- ═══ GRID SCREEN ═══ -->
<div class="screen hidden" id="grid-screen">
  <div class="grid-screen-header" style="flex-direction:column;gap:4px;">
    <div class="logo">Math Things<span class="logo-bead"></span></div>
    <div class="grid-mode-toggle">
      <button class="gmt-btn active" id="gmt-factor" title="Factor">
        <svg viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Single obelisk breaking at middle hinge -->
          <rect x="7" y="1" width="6" height="10" rx="1.5" fill="currentColor" opacity="0.9"/>
          <!-- hinge line -->
          <line x1="5" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <!-- bottom half separating slightly -->
          <rect x="7" y="13" width="6" height="10" rx="1.5" fill="currentColor" opacity="0.5"/>
        </svg>
      </button>
      <button class="gmt-btn" id="gmt-build" title="Build">
        <svg viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Three blocks stacking up — bottom largest, top smallest -->
          <rect x="4" y="17" width="12" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="5.5" y="10" width="9" height="6" rx="1.5" fill="currentColor" opacity="0.7"/>
          <rect x="7" y="3" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.95"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="num-grid" id="num-grid" style="flex:1;overflow-y:auto;align-content:start;"></div>
  <div class="dex-container" id="dex-container">
    <div class="dex-viewport" id="dex-vp"></div>
  </div>
</div>

<!-- ═══ FACTOR ALTAR SCREEN ═══ -->
<div class="screen" id="altar-screen">
  <div class="altar-header">
    <div class="altar-numeral" id="altar-numeral">12</div>
  </div>
  <div class="altar" id="fa">
    <canvas class="shatter-canvas" id="fz-canvas"></canvas>
    <div class="seg-zoom" id="fz"><div class="seg-stage" id="fo"></div></div>
    <div class="altar-pedestal"><div class="ped-platform"></div><div class="ped-step1"></div><div class="ped-step2"></div></div>
  </div>
  <div class="f-tray" id="ft"></div>
  <div class="dex-container" id="altar-dex-container">
    <div class="dex-viewport" id="altar-dex-vp"></div>
  </div>
</div>

<!-- ═══ BUILD ALTAR SCREEN ═══ -->
<div class="screen hidden" id="build-screen">
  <div class="altar-header">
    <div class="altar-numeral" id="build-numeral">2</div>
  </div>
  <div class="altar" id="ba">
    <canvas class="shatter-canvas" id="bz-canvas"></canvas>
    <div class="ceil-line" id="bceil"></div>
    <div class="seg-zoom" id="bz"><div class="seg-stage" id="bo"></div></div>
    <div class="altar-pedestal"><div class="ped-platform"></div><div class="ped-step1"></div><div class="ped-step2"></div></div>
  </div>
  <div class="build-ledger" id="bl"></div>
  <div class="build-tray-area" id="bt"></div>
  <div class="dex-container" id="build-dex-container">
    <div class="dex-viewport" id="build-dex-vp"></div>
  </div>
</div>

<div class="affirm-flash" id="affirm"></div>

<script>
const isPrime=n=>{if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true;};
const allFactors=n=>{const f=[1];for(let i=2;i<=n;i++)if(n%i===0)f.push(i);return f;};
const properFactors=n=>{const f=[];for(let i=2;i<n;i++)if(n%i===0)f.push(i);return f;};
const haptic=p=>{try{navigator.vibrate?.(p)}catch(e){}};

const S={
  primeDex:new Set(),maxLevel:1,
  fDone:new Set([1]),fNum:null,fDisc:new Set(),
  fDiscMap:{},
  segs:[],unitH:0,unitW:0,folding:false,
  foldDir:1,segSize:0,
  newPrimes:new Set(),handleTimer:null,
  hingeIdleTimer:null,
  handleIndex:0,handleInverted:false,
  // Build state
  gridMode:'factor', // 'factor' or 'build'
  bDone:new Set([1]),bNum:null,
  bStack:[],        // array of prime factors placed [{p, prevProduct}]
  bProduct:0,       // current product on altar (0 = empty)
  bUnitH:0,bUnitW:0,
  bAnimating:false,
  // Zoom state
  fZoom:1,bZoom:1,
  currentFoldZoom:1,
  refAltarH:0, // altar height for reference calculations
  pinching:false,pinchBaseZoom:1,pinchBaseDist:0,
};

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function goToAltar(n){
  const overlay=document.getElementById('fade-overlay');
  overlay.classList.add('fading');
  setTimeout(()=>{
    document.getElementById('grid-screen').classList.add('hidden');
    document.getElementById('altar-screen').classList.remove('hidden');
    enterAltar(n);
    overlay.classList.remove('fading');
  },400);
}

function goToBuild(n){
  const overlay=document.getElementById('fade-overlay');
  overlay.classList.add('fading');
  setTimeout(()=>{
    document.getElementById('grid-screen').classList.add('hidden');
    document.getElementById('build-screen').classList.remove('hidden');
    enterBuild(n);
    overlay.classList.remove('fading');
  },400);
}

function goToGrid(){
  const overlay=document.getElementById('fade-overlay');
  overlay.classList.add('fading');
  setTimeout(()=>{
    document.getElementById('altar-screen').classList.add('hidden');
    document.getElementById('build-screen').classList.add('hidden');
    document.getElementById('grid-screen').classList.remove('hidden');
    renderGrid();
    buildDex('dex-vp');
    overlay.classList.remove('fading');
  },400);
}

// Grid mode toggle
document.getElementById('gmt-factor').addEventListener('click',()=>{
  S.gridMode='factor';
  document.getElementById('gmt-factor').classList.add('active');
  document.getElementById('gmt-build').classList.remove('active');
  document.getElementById('grid-screen').style.background='';
  renderGrid();
});
document.getElementById('gmt-build').addEventListener('click',()=>{
  S.gridMode='build';
  document.getElementById('gmt-build').classList.add('active');
  document.getElementById('gmt-factor').classList.remove('active');
  document.getElementById('grid-screen').style.background='linear-gradient(180deg,rgba(6,8,18,1),rgba(8,10,20,1))';
  renderGrid();
});

function enterAltar(n){
  S.fNum=n;S.segSize=0;
  S.handleIndex=0;S.handleInverted=false;
  // Restore persisted discovery set if previously solved, otherwise fresh
  S.fDisc=S.fDiscMap[n]?new Set(S.fDiscMap[n]):new Set([1,n]);
  const numEl=document.getElementById('altar-numeral');
  numEl.textContent=n;
  // Clear any lingering animation state from previous room
  numEl.classList.remove('solved','celebrate');
  const presolvedOnEnter=(n===1||isPrime(n));
  if(presolvedOnEnter){S.fDone.add(n);}
  const isSolved=S.fDone.has(n);
  if(isSolved){numEl.classList.add('solved');}
  numEl.onclick=isSolved?()=>goToGrid():null;
  const altar=document.getElementById('fa');
  const altarH=altar.clientHeight-50;
  const altarW=altar.clientWidth;
  S.refAltarH=altarH;
  // Size so the full obelisk fills ~75% of altar height
  const targetFill=0.75;
  const rawUnitH=Math.floor((altarH*targetFill)/n);
  // Cap: never taller than wide (square), never smaller than 20px, never larger than altar/2
  const maxUnitH=Math.min(Math.floor(altarH*0.5), Math.floor(altarW*0.55));
  S.unitH=Math.max(20,Math.min(rawUnitH,maxUnitH));
  // Square segments — width matches height, capped to fit altar width comfortably
  S.unitW=Math.min(S.unitH,Math.floor(altarW*0.45),80);
  S.fZoom=1;
  S.currentFoldZoom=1;
  // Reset seg-zoom to single-obelisk centered state
  const zEl=document.getElementById('fz');
  if(zEl){zEl.classList.remove('folded');zEl.style.transition='none';zEl.style.transform='translateX(-50%)';}
  S.segs=[{units:n}];
  buildDex('altar-dex-vp');
  if(isPrime(n)){
    const isNew=!S.primeDex.has(n);
    S.primeDex.add(n);
    renderSegs();renderFT();

    const seg=document.querySelector('#fo .blk-p');
    const num=document.querySelector('#fo .n-glow');
    const rad=document.querySelector('#fo .n-radiance');

    // Phase 0: start completely dark
    if(seg){
      seg.style.transition='none';
      seg.style.background='linear-gradient(180deg,rgba(20,20,22,1),rgba(14,14,16,1))';
      seg.style.boxShadow='none';
      seg.style.border='1px solid rgba(255,255,255,0.06)';
    }
    if(num){num.style.opacity='0';}
    if(rad){rad.style.opacity='0';}

    // Phase 1 (400ms): sudden ignition — white-hot core erupts
    setTimeout(()=>{
      haptic(30);
      if(seg){
        seg.style.transition='background 0.15s ease-in, box-shadow 0.4s ease-out, border-color 0.2s';
        seg.style.background='linear-gradient(180deg,rgba(255,255,255,0.35),rgba(255,240,200,0.2),rgba(255,255,255,0.3))';
        seg.style.boxShadow=`
          inset 0 0 60px rgba(255,255,255,0.6),
          inset 0 0 120px rgba(255,220,160,0.4),
          0 0 60px rgba(255,220,160,0.5),
          0 0 120px rgba(255,180,80,0.35),
          0 0 200px rgba(255,140,40,0.2),
          0 0 300px rgba(255,100,20,0.1)`;
        seg.style.border='1px solid rgba(255,255,255,0.8)';
      }
      if(num){
        num.style.transition='opacity 0.15s ease-in, transform 0.15s ease-in, text-shadow 0.15s';
        num.style.opacity='1';
        num.style.transform='translate(-50%,-50%) scale(1.15)';
        num.style.textShadow='0 0 8px #fff,0 0 20px #fff,0 0 40px rgba(255,240,200,1),0 0 80px rgba(255,200,100,0.9),0 0 150px rgba(255,160,60,0.7)';
      }
    },400);

    // Phase 2 (900ms): settle to normal prime look
    setTimeout(()=>{
      haptic([20,30,60]);
      if(seg){
        seg.style.transition='background 1.2s ease-out, box-shadow 1.4s ease-out, border-color 1s ease-out';
        seg.style.background='linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.08),rgba(255,255,255,0.1))';
        seg.style.boxShadow='inset 0 0 35px rgba(255,200,120,0.2),inset 0 0 70px rgba(255,160,60,0.1),0 0 25px rgba(255,180,80,0.15),0 0 60px rgba(255,150,50,0.1)';
        seg.style.border='1px solid rgba(255,255,255,0.25)';
      }
      if(num){
        num.style.transition='transform 0.6s cubic-bezier(0.34,1.56,0.64,1), text-shadow 1.2s ease-out';
        num.style.transform='translate(-50%,-50%) scale(1)';
        num.style.textShadow='0 0 5px #fff,0 0 12px rgba(255,242,225,1),0 0 24px rgba(255,215,155,0.98),0 0 48px rgba(255,185,85,0.85),0 0 80px rgba(255,155,45,0.65)';
      }
      if(rad){
        rad.style.transition='opacity 1s ease-out';
        rad.style.opacity='1';
      }
      showAffirm();
    },900);

    if(isNew){setTimeout(()=>launchTrinketDrop(n,1),1800);}
  } else {
    renderSegs();renderFT();
    if(!isSolved)scheduleHingeIdle();
  }
}


function showAffirm(){const e=document.getElementById('affirm');e.classList.add('show');haptic([20,25,20,25,40]);setTimeout(()=>e.classList.remove('show'),350);}

// ════════════════════════════════════════
// ZOOM SYSTEM
// ════════════════════════════════════════
function setZoom(zoomId,scale,animate=true){
  const el=document.getElementById(zoomId);
  if(!el)return;
  if(!animate)el.style.transition='none';
  else el.style.transition='transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';
  el.style.transform=`translateX(-50%) scale(${scale})`;
  if(!animate)el.offsetHeight; // force reflow
}

function calcFoldZoom(numPieces,segUnits,foldDir){
  // After fold: segments land to one side of the base center.
  // Total visible width needed = segments on one side + equal empty space on other side.
  // So total framing width = 2 * numPieces * (unitW + gap).
  const segW=S.unitW+3;
  const totalFrameW=2*numPieces*segW;
  const altarW=document.getElementById('fa').clientWidth;
  const segH=segUnits*S.unitH;
  const altarH=S.refAltarH;
  // Zoom must fit both width and height
  const zoomW=altarW*0.9/totalFrameW;
  const zoomH=altarH*0.9/segH;
  return Math.min(zoomW,zoomH,S.fZoom); // never zoom in past default
}

// ════════════════════════════════════════
// BLOCKS
// ════════════════════════════════════════
function makeBlock(units,w,h,forceComposite=false,omitNumeral=false){
  const isMirror=units===1&&!forceComposite;
  const p=!forceComposite&&!isMirror&&isPrime(units);
  const el=document.createElement('div');
  el.className='blk '+(isMirror?'blk-m':p?'blk-p':'blk-c');
  el.style.width=w+'px';el.style.height=h+'px';
  el.dataset.units=units;
  if(omitNumeral)return el;
  if(isMirror){
    const num=document.createElement('div');num.className='n-mirror';num.textContent='1';
    num.style.fontSize=Math.min(w*0.55,h*0.4,34)+'px';el.appendChild(num);
  }else if(p){
    const rad=document.createElement('div');rad.className='n-radiance';el.appendChild(rad);
    const num=document.createElement('div');num.className='n-glow';num.textContent=units;
    num.style.fontSize=Math.min(w*0.6,h*0.45,38)+'px';el.appendChild(num);
  }else{
    const num=document.createElement('div');num.className='n-stamp';num.textContent=units;
    num.style.fontSize=Math.min(w*0.55,h*0.4,34)+'px';el.appendChild(num);
  }
  return el;
}

// Reveal numerals on all segments after fold completes
// Only targets .blk elements that are direct children of their container (not nested in hinges)
function revealNumerals(stage,segUnits,uW,uH){
  // Stage blocks already have numerals from makeBlock — just animate them in
  stage.querySelectorAll('.blk').forEach(el=>{
    const glow=el.querySelector('.n-glow');
    const stamp=el.querySelector('.n-stamp');
    if(glow){glow.classList.add('n-glow-reveal');}
    if(stamp){stamp.classList.add('n-stamp-reveal');}
  });
}

// ════════════════════════════════════════
// PRIME DEX — Relativistic Scaling
// ════════════════════════════════════════
function buildDex(vpId='altar-dex-vp'){
  const vp=document.getElementById(vpId);
  if(!vp)return;
  vp.innerHTML='';
  // No padding slots — slot 1 starts at left edge (10% padding via CSS)
  for(let i=1;i<=144;i++){
    const slot=document.createElement('div');
    slot.className='dex-slot';
    slot.dataset.n=i;
    const wrap=document.createElement('div');wrap.className='dex-trinket-wrap';
    if(i===1){
      slot.classList.add('has-prime');
      const mir=document.createElement('div');mir.className='dex-mirror';
      const num=document.createElement('div');num.className='dt-num';num.textContent='1';
      mir.appendChild(num);wrap.appendChild(mir);
    }else if(isPrime(i)&&S.primeDex.has(i)){
      slot.classList.add('has-prime');
      const t=document.createElement('div');
      t.className='dex-trinket'+(S.newPrimes.has(i)?' new-cap':'');
      const rad=document.createElement('div');rad.className='dt-radiance';t.appendChild(rad);
      const num=document.createElement('div');num.className='dt-num';num.textContent=i;
      t.appendChild(num);wrap.appendChild(t);
    }
    slot.appendChild(wrap);
    const lbl=document.createElement('div');lbl.className='dex-num';lbl.textContent=i;
    slot.appendChild(lbl);
    vp.appendChild(slot);
  }
  S.newPrimes.clear();
  vp.scrollLeft=0;
  // Enforce left boundary — slot 1 can't scroll off right
  if(!vp._scrollBound){
    vp._scrollBound=true;
    vp.addEventListener('scroll',()=>{if(vp.scrollLeft<0)vp.scrollLeft=0;},{passive:true});
  }
}

function scheduleHingeIdle(){
  clearTimeout(S.hingeIdleTimer);
  S.hingeIdleTimer=setTimeout(()=>{
    document.querySelectorAll('#fo .hm').forEach(hm=>hm.classList.add('idle'));
  },3000);
}

function cancelHingeIdle(){
  clearTimeout(S.hingeIdleTimer);
  document.querySelectorAll('#fo .hm').forEach(hm=>hm.classList.remove('idle'));
}

// Dex uses uniform fixed-size trinkets — no scaling needed

function computeHandleState(numPieces, foldDir){
  const falls=numPieces-1;
  const oddFalls=falls%2===1;
  const landsLeft=oddFalls?(foldDir<0):(foldDir>0);
  const index=landsLeft?0:numPieces-1;
  // Face-down (inverted) on odd falls, face-up on even falls — same physics regardless of swipe direction
  const inverted=oddFalls;
  return{index,inverted};
}

// ════════════════════════════════════════
// TRINKET DROP CEREMONY
// ════════════════════════════════════════
function scrollDexToSlot(n, vpId, cb){
  const vp=document.getElementById(vpId);
  if(!vp){cb&&cb();return;}
  // Find the actual slot element and scroll so it's centered in the viewport
  const slot=vp.querySelector(`.dex-slot[data-n="${n}"]`);
  if(slot){
    const slotLeft=slot.offsetLeft;
    const slotW=slot.offsetWidth;
    const vpW=vp.clientWidth;
    const target=slotLeft-vpW/2+slotW/2;
    vp.scrollTo({left:Math.max(0,target),behavior:'smooth'});
  }
  setTimeout(()=>{cb&&cb();},500);
}

function launchTrinketDrop(primeN, segCount){
  const vpId='altar-dex-vp';
  const stage=document.getElementById('fo');
  const dexContainer=document.getElementById('altar-dex-container');
  if(!stage||!dexContainer)return;

  // Find the source block — center segment for odd, left-of-center for even
  const segEls=Array.from(stage.querySelectorAll('.blk'));
  let srcEl=null;
  if(segCount<=1){
    srcEl=segEls[0];
  } else if(segCount%2===1){
    srcEl=segEls[Math.floor(segCount/2)];
  } else {
    srcEl=segEls[segCount/2-1];
  }
  if(!srcEl)return;

  const srcRect=srcEl.getBoundingClientRect();
  const srcW=srcRect.width;
  const srcH=srcRect.height;
  const srcCX=srcRect.left+srcW/2;
  const srcCY=srcRect.top+srcH/2;

  // Trinket target dimensions (match dex-trinket-wrap: 11vw × 52px)
  const tw=Math.round(window.innerWidth*0.11);
  const th=52;

  const vp=document.getElementById(vpId);
  const container=document.getElementById('altar-dex-container');

  // Clone the source block at its exact position, fixed over everything
  const clone=document.createElement('div');
  clone.style.cssText=`
    position:fixed;z-index:9000;pointer-events:none;
    width:${srcW}px;height:${srcH}px;
    left:${srcRect.left}px;top:${srcRect.top}px;
    transform-origin:center center;
    border-radius:6px;overflow:visible;
    background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(240,242,248,0.08),rgba(255,255,255,0.1));
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:inset 0 0 30px rgba(255,200,120,0.15),0 0 30px rgba(255,180,80,0.15),0 0 70px rgba(255,140,40,0.08);
    display:flex;align-items:center;justify-content:center;
  `;
  // Numeral — same font size as the obelisk numeral
  const numEl=document.createElement('div');
  const numFontSize=Math.min(srcW*0.6,srcH*0.45,38);
  numEl.style.cssText=`font-family:'Lexend',sans-serif;font-weight:900;font-size:${numFontSize}px;
    letter-spacing:-1px;color:#fff;
    text-shadow:0 0 4px #fff,0 0 12px rgba(255,220,160,1),0 0 25px rgba(255,180,80,0.8),0 0 50px rgba(255,140,40,0.5);
    position:relative;z-index:2;`;
  numEl.textContent=primeN;
  clone.appendChild(numEl);
  document.body.appendChild(clone);

  // Phase 1: scroll dex to slot and spotlight simultaneously
  vp.querySelectorAll('.dex-slot[data-n]').forEach(sl=>{
    sl.classList.toggle('dimmed',parseInt(sl.dataset.n)!==primeN);
  });
  scrollDexToSlot(primeN,vpId,null);

  // Phase 2: compress to trinket size over 600ms
  const compressDur=600;
  const scaleY=th/srcH;
  const scaleX=tw/srcW;
  clone.style.transition=`transform ${compressDur}ms cubic-bezier(0.4,0,0.6,1)`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    clone.style.transform=`scaleX(${scaleX}) scaleY(${scaleY})`;
  }));

  // Phase 3: after compress + scroll settle, drop to actual slot position
  setTimeout(()=>{
    // Get slot position now that scroll has settled
    const slot=vp.querySelector(`.dex-slot[data-n="${primeN}"]`);
    const dexRect=container.getBoundingClientRect();
    let landX=dexRect.left+dexRect.width/2; // fallback
    let landY=dexRect.top+dexRect.height/2;
    if(slot){
      const slotRect=slot.getBoundingClientRect();
      landX=slotRect.left+slotRect.width/2;
      landY=slotRect.top+slotRect.height/2;
    }

    const dropDur=400;
    const dx=landX-srcCX;
    const dy=landY-srcCY;
    clone.style.transition=`transform ${dropDur}ms cubic-bezier(0.4,0,1,1)`;
    clone.style.transform=`scaleX(${scaleX}) scaleY(${scaleY}) translate(${dx/scaleX}px,${dy/scaleY}px)`;

    setTimeout(()=>{
      haptic([15,10,40]);
      clone.remove();
      const targetSlot=vp.querySelector(`.dex-slot[data-n="${primeN}"]`);
      if(targetSlot)targetSlot.classList.add('land-flash');
      S.newPrimes.add(primeN);
      buildDex(vpId);
      // Re-scroll to slot after buildDex rebuilds the DOM
      setTimeout(()=>scrollDexToSlot(primeN,vpId,null),50);
      setTimeout(()=>{
        vp.querySelectorAll('.dex-slot').forEach(sl=>sl.classList.remove('dimmed','spotlight'));
      },800);
    },dropDur+40);
  },compressDur+200); // extra 200ms for scroll to settle
}
// ════════════════════════════════════════
// NEST TREE (for fold/unspool animations)
// ════════════════════════════════════════
function buildNestTree(numPieces,segH,uW,foldDir,startFolded){
  const hinges=[];

  function build(level){
    const container=document.createElement('div');
    container.style.cssText=`position:absolute;bottom:0;left:0;width:${uW}px;height:0;`;
    const blk=makeBlock(S.segSize||S.fNum,uW,segH,true,true);
    blk.style.position='absolute';blk.style.bottom='0';blk.style.left='0';
    container.appendChild(blk);

    if(level<numPieces-1){
      const hw=document.createElement('div');
      const depth=numPieces-1-level;
      const dir=depth%2===0?-foldDir:foldDir;
      hw.style.cssText=`position:absolute;bottom:${segH}px;left:0;width:${uW}px;height:0;`;
      hw.style.transformOrigin=dir<0?'0% 100%':'100% 100%';
      if(startFolded) hw.style.transform=`rotate(${dir<0?-180:180}deg)`;
      hw._dir=dir;
      const child=build(level+1);
      hw.appendChild(child);container.appendChild(hw);
      hinges.push({hw,dir,depth});
    }
    return container;
  }
  return {root:build(0),hinges};
}

// ════════════════════════════════════════
// RENDER SEGMENTS
// ════════════════════════════════════════
function makeHandle(inverted){
  const handle=document.createElement('div');
  handle.className='handle'+(inverted?' inverted':'');
  handle.style.touchAction='none';
  handle.addEventListener('pointerdown',e=>{if(!S.folding){e.preventDefault();beginUnspool();}});
  return handle;
}

function renderSegs(){
  const stage=document.getElementById('fo');stage.innerHTML='';
  if(S.segs.length===0)return;
  const uH=S.unitH,uW=S.unitW;
  const numSegs=S.segs.length;
  const gap=3;

  // Offset stage so the BASE SEGMENT is always centered at screen center.
  // seg-zoom left edge = screen center (left:50%, no translateX).
  // For single obelisk and right-fold base (i=0): shift left by uW/2.
  // For left-fold base (i=numSegs-1): shift left by (numSegs*(uW+gap)-gap) - uW/2.
  const zoomEl=document.getElementById('fz');
  if(numSegs===1){
    zoomEl.classList.remove('folded');
    stage.style.marginLeft='';
    zoomEl.style.transition='transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)';
    zoomEl.style.transform='translateX(-50%)';
    S.currentFoldZoom=1;
  } else {
    const falls=numSegs-1;
    const oddFalls=falls%2===1;
    const landsLeft=oddFalls?(S.foldDir<0):(S.foldDir>0);
    const baseCenter=landsLeft?((numSegs-1)*(uW+gap)+uW/2):(uW/2);
    stage.style.marginLeft=(-baseCenter)+'px';
    const zoom=S.currentFoldZoom||calcFoldZoom(numSegs,S.segs[0].units,S.foldDir);
    // Switch to folded class (removes translateX), apply scale without re-triggering transition
    zoomEl.style.transition='none';
    zoomEl.style.transform=`scale(${zoom})`;
    zoomEl.classList.add('folded');
  }

  S.segs.forEach((seg,i)=>{
    const h=seg.units*uH;
    const el=makeBlock(seg.units,uW,h);
    if(numSegs===1){
      el.appendChild(makeHandle(false));
      if(!isPrime(seg.units)){
        properFactors(seg.units).forEach(f=>{
          const hingeY=f*uH;
          const zone=document.createElement('div');zone.className='hz';zone.style.top=hingeY+'px';
          const mark=document.createElement('div');mark.className='hm';zone.appendChild(mark);
          let touchSide=1;
          zone.addEventListener('pointerdown',e=>{zone.classList.add('swiping');cancelHingeIdle();
            const rect=el.getBoundingClientRect();touchSide=(e.clientX-rect.left)<rect.width/2?-1:1;});
          zone.addEventListener('pointerup',e=>{zone.classList.remove('swiping');doFold(f,touchSide);});
          el.appendChild(zone);
        });
      }
    } else {
      if(i===S.handleIndex){el.appendChild(makeHandle(S.handleInverted));}
    }
    stage.appendChild(el);
  });
  if(S.segs.length===1&&!isPrime(S.segs[0].units)){scheduleHingeIdle();}
  if(S.segs.length>1){
    clearTimeout(S.handleTimer);
    S.handleTimer=setTimeout(()=>{
      const handle=stage.querySelector('.handle');
      if(handle)handle.classList.add('pulse');
    },2500);
  }
}

// ════════════════════════════════════════
// FOLD
// ════════════════════════════════════════
function doFold(f,swipeSide){
  if(S.folding||S.segs.length!==1)return;
  S.folding=true;haptic(50);
  const totalUnits=S.segs[0].units;
  if(totalUnits%f!==0){S.folding=false;return;}
  const numPieces=totalUnits/f;
  const uH=S.unitH,uW=S.unitW,segH=f*uH;
  S.foldDir=swipeSide;S.segSize=f;

  const stage=document.getElementById('fo');
  // Hide the original obelisk numeral immediately
  stage.querySelectorAll('.n-stamp,.n-glow,.n-radiance').forEach(el=>el.remove());
  stage.style.visibility='hidden';

  const altar=document.getElementById('fa');
  const overlay=document.createElement('div');
  overlay.style.cssText=`position:absolute;bottom:36px;left:50%;margin-left:${-uW/2}px;z-index:50;pointer-events:none;`;

  // Calculate zoom needed and apply to seg-zoom concurrently with cascade
  const foldZoom=calcFoldZoom(numPieces,f,swipeSide);
  const zoomEl=document.getElementById('fz');
  if(foldZoom<(S.fZoom-0.02)){
    // Zoom out needed — animate scale only, translateX(-50%) stays until renderSegs switches to folded
    zoomEl.style.transition='transform 1.2s cubic-bezier(0.25,0.46,0.45,0.94)';
    zoomEl.style.transform=`translateX(-50%) scale(${foldZoom})`;
    S.currentFoldZoom=foldZoom;
  } else {
    S.currentFoldZoom=1;
  }
  altar.appendChild(overlay);

  // Animation only — no handle in overlay
  const{root,hinges}=buildNestTree(numPieces,segH,uW,swipeSide,false);
  overlay.appendChild(root);
  const sorted=[...hinges].sort((a,b)=>a.depth-b.depth);
  const phaseDur=500,pause=80;

  sorted.forEach(({hw,dir},i)=>{
    hw.style.transition=`transform ${phaseDur}ms var(--ease-heavy)`;
    const rot=dir<0?-180:180;
    const delay=i*(phaseDur+pause);
    setTimeout(()=>{
      hw.style.transform=`rotate(${rot}deg)`;haptic(30);
      setTimeout(()=>{
        hw.style.transition='transform 80ms ease-out';
        hw.style.transform=`rotate(${rot>0?rot-4:rot+4}deg)`;
        setTimeout(()=>{hw.style.transition='transform 60ms ease-in';hw.style.transform=`rotate(${rot}deg)`;haptic(15);},80);
      },phaseDur-20);
    },delay);
  });

  const totalAnimTime=sorted.length*(phaseDur+pause)+200;
  setTimeout(()=>{
    const isNewPrime=isPrime(f)&&!S.primeDex.has(f);
    if(!S.fDisc.has(f))S.fDisc.add(f);
    if(isPrime(f))S.primeDex.add(f);
    renderFT();checkFSolved();
    S.segs=[];for(let i=0;i<numPieces;i++)S.segs.push({units:f});
    const hs=computeHandleState(numPieces,swipeSide);
    S.handleIndex=hs.index;S.handleInverted=hs.inverted;
    S.folding=false;
    setTimeout(()=>{
      overlay.remove();
      stage.style.visibility='visible';
      renderSegs();
      // Reveal numerals on real stage after segments render correctly oriented
      revealNumerals(document.getElementById('fo'),f,uW,uH);
      if(isNewPrime){
        setTimeout(()=>launchTrinketDrop(f,numPieces),isPrime(f)?900:200);
      } else {
        buildDex('altar-dex-vp');
      }
    },600);
  },totalAnimTime);
}

// ════════════════════════════════════════
// UNSPOOL (drag-based)
// ════════════════════════════════════════
let US=null;
function beginUnspool(){
  if(S.folding||S.segs.length<=1)return;
  S.folding=true;
  const stage=document.getElementById('fo');const altar=document.getElementById('fa');
  const uH=S.unitH,uW=S.unitW,numSegs=S.segs.length,segH=S.segs[0].units*uH;
  stage.style.visibility='hidden';

  const overlay=document.createElement('div');
  // Nest tree level 0 = base. Base is always at screen center.
  // So overlay left edge should be at screen_center - uW/2 (base center at screen center).
  overlay.style.cssText=`position:absolute;bottom:36px;left:50%;margin-left:${-uW/2}px;z-index:50;`;
  altar.appendChild(overlay);

  // withHandle=true — handle rides on the top block in the folded stack too
  const{root,hinges}=buildNestTree(numSegs,segH,uW,S.foldDir,true);
  overlay.appendChild(root);
  // Sort shallowest first (outermost hinge = first to open when pulling up)
  const sorted=[...hinges].sort((a,b)=>a.depth-b.depth);
  sorted.forEach(({hw})=>{hw.style.transition='none';});

  // Cascade mapping: each hinge has a lead window. First hinge leads, rest follow with overlap.
  // overlap=0.5 means next hinge starts when current is 50% done.
  const overlap=0.5;
  const n=sorted.length;
  // Each hinge occupies a window; windows overlap so total span is compressed
  // window width = 1/(n - (n-1)*overlap) ... simplified: each starts at i*(1-overlap)/n_norm
  const windowSize=1/(1+(n-1)*(1-overlap));
  const starts=sorted.map((_,i)=>i*(1-overlap)*windowSize);

  const totalDragDist=(numSegs-1)*segH*1.2;
  // Determine which direction is "toward center" based on landing side
  const falls=numSegs-1;
  const oddFalls=falls%2===1;
  const landsLeft=oddFalls?(S.foldDir<0):(S.foldDir>0);
  // landsLeft: handle is on left side, toward-center = rightward (positive dx)
  // !landsLeft: handle is on right side, toward-center = leftward (negative dx)
  const centerSign=landsLeft?1:-1;
  const startZoom=S.currentFoldZoom||1;
  US={overlay,sorted,starts,windowSize,totalDragDist,startY:null,startX:null,active:true,centerSign,startZoom};

  const zoomEl=document.getElementById('fz');
  const onMove=e=>{
    if(!US||!US.active)return;e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    if(US.startY===null){US.startY=t.clientY;US.startX=t.clientX;}
    const dragY=US.startY-t.clientY;
    const dragX=(t.clientX-US.startX)*US.centerSign;
    const combined=dragY+Math.max(0,dragX)*0.4;
    const progress=Math.max(0,Math.min(1,combined/US.totalDragDist));
    US.sorted.forEach(({hw,dir},i)=>{
      const hProg=Math.max(0,Math.min(1,(progress-US.starts[i])/US.windowSize));
      hw.style.transform=`rotate(${(dir<0?-180:180)*(1-hProg)}deg)`;
    });
    // Ease zoom back toward 1 as progress increases
    if(US.startZoom<1){
      const dragZoom=US.startZoom+(1-US.startZoom)*progress;
      zoomEl.style.transition='none';
      zoomEl.style.transform=`scale(${dragZoom})`;
    }
  };
  const onUp=e=>{
    if(!US||!US.active)return;
    const t=e.changedTouches?e.changedTouches[0]:e;
    if(US.startY===null){cancelUS(onMove,onUp);return;}
    const dragY=US.startY-t.clientY;
    const dragX=(t.clientX-US.startX)*US.centerSign;
    const combined=dragY+Math.max(0,dragX)*0.4;
    const progress=combined/US.totalDragDist;
    if(progress>=0.85)completeUS(onMove,onUp);else cancelUS(onMove,onUp);
  };
  document.addEventListener('pointermove',onMove,{passive:false});
  document.addEventListener('pointerup',onUp);
}
function cancelUS(onMove,onUp){
  if(!US)return;US.active=false;
  US.sorted.forEach(({hw,dir})=>{hw.style.transition='transform 0.4s var(--ease-heavy)';hw.style.transform=`rotate(${dir<0?-180:180}deg)`;});
  // Ease zoom back to fold zoom
  if(US.startZoom<1){
    const zoomEl=document.getElementById('fz');
    zoomEl.style.transition='transform 0.4s ease';
    zoomEl.style.transform=`scale(${US.startZoom})`;
  }
  setTimeout(()=>{US?.overlay?.remove();document.getElementById('fo').style.visibility='visible';S.folding=false;US=null;},450);
  document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);
}
function completeUS(onMove,onUp){
  if(!US)return;US.active=false;haptic([20,30,20]);
  US.sorted.forEach(({hw})=>{hw.style.transition='transform 0.2s var(--spring)';hw.style.transform='rotate(0deg)';});
  // Ease zoom back to 1 (single obelisk)
  const zoomEl=document.getElementById('fz');
  zoomEl.style.transition='transform 0.3s var(--spring)';
  zoomEl.style.transform='translateX(-50%)';
  S.currentFoldZoom=1;
  setTimeout(()=>{
    US?.overlay?.remove();
    document.getElementById('fo').style.visibility='visible';
    S.segs=[{units:S.fNum}];S.folding=false;US=null;
    renderSegs();
    scheduleHingeIdle();
  },250);
  document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);
}

function checkFSolved(){
  const n=S.fNum;if(!n||S.fDone.has(n))return;
  if(allFactors(n).every(f=>S.fDisc.has(f))){
    S.fDone.add(n);
    S.fDiscMap[n]=new Set(S.fDisc);
    checkLvl();
    const numEl=document.getElementById('altar-numeral');
    numEl.onclick=()=>goToGrid();
    // Delay celebration until after trinket drop lands (~600 compress + 380 drop + 40 land + 500 pause)
    setTimeout(()=>{
      showAffirm();
      // Green circle bloom
      numEl.classList.add('celebrate');
      // After bloom settles, swap to breathing solved state
      setTimeout(()=>{
        numEl.classList.remove('celebrate');
        numEl.classList.add('solved');
      },1100);
    },1600);
  }
}

function checkLvl(){
  const max=S.maxLevel*12;
  for(let i=1;i<=max;i++)if(!S.fDone.has(i))return;
  S.maxLevel++;
}

// ════════════════════════════════════════
// GRID SCREEN
// ════════════════════════════════════════
function getPrimeFactors(n){
  const f=[];let x=n;
  for(let p=2;p*p<=x;p++){while(x%p===0){f.push(p);x/=p;}}
  if(x>1)f.push(x);
  return f;
}

function makeCellSolved(n, factors, clickFn){
  const c=document.createElement('div');
  c.className='nc done';
  // Number top-left
  const lbl=document.createElement('div');lbl.className='nc-label';lbl.textContent=n;
  c.appendChild(lbl);
  // Trinkets
  if(factors.length>0){
    const wrap=document.createElement('div');wrap.className='nc-trinkets';
    // Show up to ~12 trinkets, overflow indicator if more
    const maxShow=12;
    factors.slice(0,maxShow).forEach(f=>{
      const t=document.createElement('div');
      t.className='nc-t '+(f===1?'nc-tm':isPrime(f)?'nc-tp':'nc-tc');
      t.textContent=f;
      wrap.appendChild(t);
    });
    if(factors.length>maxShow){
      const ov=document.createElement('div');ov.className='nc-overflow';
      ov.textContent='+';wrap.appendChild(ov);
    }
    c.appendChild(wrap);
  }
  c.addEventListener('click',clickFn);
  return c;
}

function renderGrid(){
  const g=document.getElementById('num-grid');g.innerHTML='';
  const max=S.maxLevel*12;
  if(S.gridMode==='factor'){
    for(let i=1;i<=max;i++){
      let c;
      if(S.fDone.has(i)){
        const factors=allFactors(i); // includes 1 and i
        c=makeCellSolved(i,factors,()=>goToAltar(i));
      } else {
        c=document.createElement('div');
        c.className='nc avail';
        const num=document.createElement('div');num.className='nc-num';num.textContent=i;
        c.appendChild(num);
        c.addEventListener('click',()=>goToAltar(i));
      }
      g.appendChild(c);
    }
    for(let i=max+1;i<=max+12;i++){
      const c=document.createElement('div');c.className='nc locked';
      const num=document.createElement('div');num.className='nc-num';num.textContent=i;
      c.appendChild(num);g.appendChild(c);
    }
  } else {
    // Build mode
    for(let i=1;i<=max;i++){
      let c;
      const canBuild=i===1||S.bDone.has(i)||(i>1&&S.bDone.has(i-1));
      const built=S.bDone.has(i);
      const neededPrimes=i>1?getPrimeFactors(i):[];
      const hasAllPrimes=neededPrimes.every(p=>S.primeDex.has(p));
      if(built||i===1){
        const factors=i===1?[1]:getPrimeFactors(i);
        c=makeCellSolved(i,factors,i>1?()=>goToBuild(i):null);
      } else if(canBuild&&hasAllPrimes){
        c=document.createElement('div');c.className='nc avail';
        const num=document.createElement('div');num.className='nc-num';num.textContent=i;
        c.appendChild(num);
        c.addEventListener('click',()=>goToBuild(i));
      } else {
        c=document.createElement('div');c.className='nc locked';
        if(canBuild){c.className='nc';c.style.background='rgba(255,255,255,0.02)';}
        const num=document.createElement('div');num.className='nc-num';
        num.textContent=i;num.style.color='rgba(255,255,255,0.12)';
        c.appendChild(num);
      }
      g.appendChild(c);
    }
    for(let i=max+1;i<=max+12;i++){
      const c=document.createElement('div');c.className='nc locked';
      const num=document.createElement('div');num.className='nc-num';num.textContent=i;
      c.appendChild(num);g.appendChild(c);
    }
  }
}

function renderFT(){
  const tray=document.getElementById('ft');tray.innerHTML='';
  const n=S.fNum;if(!n)return;
  allFactors(n).forEach(f=>{
    const s=document.createElement('div');s.className='fs';s.textContent=f;
    if(f===1)s.classList.add('mirror');
    else if(f===n&&!isPrime(n))s.classList.add(S.fDisc.has(f)?'starter':'empty');
    else if(S.fDisc.has(f))s.classList.add(isPrime(f)?'fp':'fc');
    else{s.classList.add('empty');s.textContent='';}
    if(f===n&&!isPrime(n)&&!S.fDisc.has(f))s.textContent='';
    tray.appendChild(s);
  });
}
