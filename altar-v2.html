// T3 — Three.js atmosphere layer
// Position computed from game state, never from DOM rects
// ════════════════════════════════════════════════════
const T3 = (() => {
  const ROOMS = {};
  const WU = 80;
  const DEPTH = 55;
  const PEDESTAL_Y = -80;
  const PEDESTAL_Z = 300;   // push pedestal further back so it doesn't block stage
  const OBELISK_Z  = -100;
  let clock, primeMat, metalMat, mirrorMat, pedestalMat, loopRunning=false;

  // ── Supernova plasma in frosted glass ────────────────────
  function makePrimeMat() {
    return new THREE.ShaderMaterial({
      uniforms:{ uTime:{value:0}, uGlow:{value:2.5} },
      vertexShader:`
        varying vec2 vUv; varying vec3 vNorm;
        void main(){ vUv=uv; vNorm=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }
      `,
      fragmentShader:`
        uniform float uTime; uniform float uGlow;
        varying vec2 vUv; varying vec3 vNorm;
        vec3 m289(vec3 x){return x-floor(x*(1./289.))*289.;}
        vec4 m289(vec4 x){return x-floor(x*(1./289.))*289.;}
        vec4 perm(vec4 x){return m289(((x*34.)+1.)*x);}
        vec4 tiSq(vec4 r){return 1.79284291400159-0.85373472095314*r;}
        float snoise(vec3 v){
          const vec2 C=vec2(1./6.,1./3.); const vec4 D=vec4(0.,.5,1.,2.);
          vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
          vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.-g;
          vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
          vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
          i=m289(i);
          vec4 p=perm(perm(perm(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
          float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
          vec4 j=p-49.*floor(p*ns.z*ns.z);
          vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.*x_);
          vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy;
          vec4 h=1.-abs(x)-abs(y);
          vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
          vec4 s0=floor(b0)*2.+1.; vec4 s1=floor(b1)*2.+1.;
          vec4 sh=-step(h,vec4(0.));
          vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
          vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
          vec4 norm=tiSq(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
          p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
          vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
          m=m*m; return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
        }
        float fbm(vec3 p){ float t=0.,a=.5; for(int i=0;i<5;i++){t+=a*snoise(p);p*=2.15;a*=.55;} return t; }
        void main(){
          vec3 p=vec3(vUv.x*3.1,vUv.y*5.2-uTime*2.8,uTime*1.6);
          float n1=fbm(p); float n2=fbm(p*2.4+vec3(0.,uTime*1.1,uTime*.7));
          float plasma=smoothstep(-.25,.98,n1*.82+n2*.74);
          vec3 ember=vec3(0.85,.12,.02); vec3 orange=vec3(1.,.45,.06);
          vec3 yellow=vec3(1.,.85,.2); vec3 core=vec3(1.,.98,.85);
          vec3 col=mix(ember,orange,smoothstep(0.,.4,plasma));
          col=mix(col,yellow,smoothstep(.3,.75,plasma));
          col=mix(col,core,smoothstep(.7,1.,plasma));
          float fresnel=pow(1.-abs(dot(normalize(vNorm),vec3(0.,0.,1.))),2.8);
          float edgeX=smoothstep(0.,.06,vUv.x)*smoothstep(1.,.94,vUv.x);
          float edgeY=smoothstep(0.,.06,vUv.y)*smoothstep(1.,.94,vUv.y);
          float edgeMask=edgeX*edgeY;
          vec3 glass=vec3(.06,.04,.02);
          vec3 interior=col*(1.2+plasma*1.5);
          interior+=vec3(1.,.55,.1)*fresnel*1.2;
          vec3 final=mix(glass,interior,edgeMask*0.88);
          float topSheen=smoothstep(.92,1.,vUv.y)*edgeX*0.2;
          final+=vec3(.6,.5,.35)*topSheen;
          gl_FragColor=vec4(final,1.);
        }
      `,
    });
  }

  function makeMaterials() {
    if(primeMat) return;
    clock = new THREE.Clock();
    primeMat = makePrimeMat();

    // Composite: mid-grey brushed aluminum — NOT metallic, NOT bright
    metalMat = new THREE.MeshLambertMaterial({
      color: new THREE.Color(0.48, 0.49, 0.52), // mid-grey like real aluminum
    });

    // Mirror: reflective chrome
    mirrorMat = new THREE.MeshStandardMaterial({
      color: 0xcccccc,
      metalness: 0.95,
      roughness: 0.05,
    });

    // Pedestal: dark concrete — inspo mid-grey
    pedestalMat = new THREE.MeshLambertMaterial({
      color: new THREE.Color(0.18, 0.19, 0.21),
    });
  }

  function getMat(units, forceComposite) {
    if(units===1 && !forceComposite) return mirrorMat;
    if(!forceComposite && isPrime(units)) return primeMat;
    return metalMat;
  }

  function makeLabel(text, isPrimeBlock, isMirrorBlock) {
    const c=document.createElement('canvas'); c.width=256; c.height=256;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,256,256);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const fs=Math.round(Math.min(200,Math.max(80,260/Math.max(1,String(text).length))));
    ctx.font=`900 ${fs}px Lexend,sans-serif`;
    if(isPrimeBlock){
      ctx.fillStyle='#fffef5';
      ctx.shadowColor='rgba(255,230,150,1)'; ctx.shadowBlur=40;
      ctx.fillText(String(text),128,128);
      ctx.shadowBlur=18;
      ctx.fillText(String(text),128,128);
    } else if(isMirrorBlock){
      ctx.fillStyle='rgba(20,22,28,0.85)';
      ctx.shadowColor='rgba(255,255,255,0.4)'; ctx.shadowBlur=8;
      ctx.fillText(String(text),128,128);
    } else {
      ctx.fillStyle='rgba(20,22,28,0.85)';
      ctx.shadowColor='rgba(255,255,255,0.15)'; ctx.shadowBlur=1;
      ctx.fillText(String(text),128,128);
    }
    const tex=new THREE.CanvasTexture(c);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
    return new THREE.Sprite(mat);
  }

  function makeBlockMesh(units, forceComposite) {
    const h=units*WU; const w=WU; const d=DEPTH;
    const geo=new THREE.BoxGeometry(w,h,d);
    const mat=getMat(units,forceComposite);
    const mesh=new THREE.Mesh(geo,mat);
    mesh.castShadow=true; mesh.receiveShadow=false;
    mesh.userData={units,h,w,forceComposite};

    const isMirrorBlock=units===1&&!forceComposite;
    const isPrimeBlock=!forceComposite&&!isMirrorBlock&&isPrime(units);
    if(!forceComposite||units>0){
      const sp=makeLabel(units,isPrimeBlock,isMirrorBlock);
      sp.scale.set(w*0.82,Math.min(h*0.48,w*0.75),1);
      sp.position.set(0,0,d/2+2);
      mesh.add(sp);
      mesh.userData.labelSprite=sp;
    }

    if(isPrimeBlock){
      const pl=new THREE.PointLight(0xff8030,35,WU*units*4,1.5);
      pl.position.set(0,0,d/2+10);
      mesh.add(pl); mesh.userData.primeLight=pl;
    }

    return mesh;
  }

  // ── Room: just the pedestal, no floor/walls (CSS handles background) ──
  function buildRoom(room) {
    const {scene}=room;

    // Round altar table — the inspo concrete table
    // Wide circular slab
    const slabGeo=new THREE.CylinderGeometry(480,500,22,48);
    const slab=new THREE.Mesh(slabGeo,pedestalMat);
    slab.position.set(0,PEDESTAL_Y+48,PEDESTAL_Z);
    slab.castShadow=true; slab.receiveShadow=true;
    scene.add(slab);

    // Tapered column base
    const baseGeo=new THREE.CylinderGeometry(160,220,48,32);
    const base=new THREE.Mesh(baseGeo,pedestalMat);
    base.position.set(0,PEDESTAL_Y+24,PEDESTAL_Z);
    base.castShadow=true; base.receiveShadow=true;
    scene.add(base);

    // Small ground disc under pedestal so shadows have somewhere to land
    const groundGeo=new THREE.CircleGeometry(800,48);
    const groundMat=new THREE.MeshLambertMaterial({color:new THREE.Color(0.04,0.04,0.05)});
    const ground=new THREE.Mesh(groundGeo,groundMat);
    ground.rotation.x=-Math.PI/2;
    ground.position.set(0,PEDESTAL_Y-1,PEDESTAL_Z);
    ground.receiveShadow=true;
    scene.add(ground);

    room.pedestalY = PEDESTAL_Y+60;
  }

  function init(altarId, canvasId) {
    if(!window.THREE){ setTimeout(()=>init(altarId,canvasId),50); return; }
    if(ROOMS[altarId]) return;
    makeMaterials();

    const altarEl=document.getElementById(altarId);
    const canvas=document.getElementById(canvasId);
    if(!altarEl||!canvas) return;

    const w=altarEl.clientWidth||360, h=altarEl.clientHeight||600;

    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    renderer.setSize(w,h,false);
    renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.setClearColor(0x000000,0); // transparent — CSS shows through

    const scene=new THREE.Scene();
    // No fog — CSS handles the atmosphere

    // Camera
    const cam=new THREE.PerspectiveCamera(42,w/h,1,8000);
    cam.position.set(0,380,1200);
    cam.lookAt(0,100,0);

    // ── Lighting — single dramatic overhead + subtle fill ──
    // Low ambient
    const ambient=new THREE.AmbientLight(0x303030,0.45);
    scene.add(ambient);

    // THE key light — overhead spot, like the inspo photo
    const obeliskSpot=new THREE.SpotLight(0xe0e4f0,45,3000,Math.PI/7,0.45,1.3);
    obeliskSpot.position.set(0,900,100);
    obeliskSpot.target.position.set(0,150,OBELISK_Z);
    obeliskSpot.castShadow=true;
    obeliskSpot.shadow.mapSize.set(1024,1024);
    obeliskSpot.shadow.radius=6;
    scene.add(obeliskSpot,obeliskSpot.target);

    // Warm accent on tray area — gentle
    const traySpot=new THREE.SpotLight(0xffecc8,18,1500,Math.PI/8,0.6,1.6);
    traySpot.position.set(0,500,500);
    traySpot.target.position.set(0,PEDESTAL_Y+60,PEDESTAL_Z);
    traySpot.castShadow=false;
    scene.add(traySpot,traySpot.target);

    const room={altarEl,canvas,renderer,scene,cam,
      obeliskSpot,traySpot,
      stageMeshes:[], trayMeshes:[],
      pedestalY:0,
    };
    buildRoom(room);

    // Env map for mirror
    const envTarget=new THREE.WebGLCubeRenderTarget(128,{
      format:THREE.RGBAFormat,
      generateMipmaps:true,
      minFilter:THREE.LinearMipmapLinearFilter,
    });
    const cubeCamera=new THREE.CubeCamera(1,5000,envTarget);
    cubeCamera.position.set(0,PEDESTAL_Y+60+WU/2,PEDESTAL_Z);
    scene.add(cubeCamera);
    requestAnimationFrame(()=>{
      renderer.render(scene,cam);
      cubeCamera.update(renderer,scene);
      mirrorMat.envMap=envTarget.texture;
      mirrorMat.needsUpdate=true;
    });

    ROOMS[altarId]=room;

    window.addEventListener('resize',()=>{
      const nw=altarEl.clientWidth, nh=altarEl.clientHeight;
      renderer.setSize(nw,nh,false);
      cam.aspect=nw/nh; cam.updateProjectionMatrix();
    });

    if(!loopRunning){ loopRunning=true; renderLoop(); }
    return room;
  }

  function renderLoop(){
    requestAnimationFrame(renderLoop);
    const t=clock?clock.getElapsedTime():0;
    if(primeMat){
      primeMat.uniforms.uTime.value=t;
      primeMat.uniforms.uGlow.value=2.5+Math.sin(t*1.8)*0.8;
    }
    Object.values(ROOMS).forEach(room=>{
      room.stageMeshes.forEach(m=>{
        const pl=m.userData.primeLight;
        if(pl) pl.intensity=35+Math.sin(t*2.2+m.position.y*0.01)*15;
      });
      room.trayMeshes.forEach(m=>{
        const pl=m.userData.primeLight;
        if(pl) pl.intensity=20+Math.sin(t*2.0)*10;
      });
      room.renderer.render(room.scene,room.cam);
    });
  }

  function cssToWorldY(cssBottomPx, altarH) {
    const scale = WU / S.unitH;
    return PEDESTAL_Y + 60 + cssBottomPx * scale * S.fZoom;
  }

  function rebuildStage(altarId) {
    const room=ROOMS[altarId]; if(!room) return;
    room.stageMeshes.forEach(m=>{
      if(m.userData.primeLight) m.remove(m.userData.primeLight);
      room.scene.remove(m);
    });
    room.stageMeshes=[];

    const uH=S.unitH, uW=S.unitW, gap=3;
    const numSegs=S.segs.length;
    if(numSegs===0) return;
    const scale=WU/uW;

    if(numSegs===1){
      const units=S.segs[0].units;
      const h=units*WU;
      const mesh=makeBlockMesh(units,false);
      mesh.position.set(0, PEDESTAL_Y+60+h/2, OBELISK_Z);
      room.scene.add(mesh);
      room.stageMeshes.push(mesh);
    } else {
      const segUnits=S.segs[0].units;
      const segH=segUnits*WU;
      const falls=numSegs-1;
      const oddFalls=falls%2===1;
      const landsLeft=oddFalls?(S.foldDir<0):(S.foldDir>0);
      const segW=WU+gap*scale;

      S.segs.forEach((seg,i)=>{
        const baseIndex=landsLeft?numSegs-1:0;
        const distFromBase=Math.abs(baseIndex-i);
        const isInverted=distFromBase%2===1;
        const mesh=makeBlockMesh(seg.units,true);
        const xOffset=landsLeft?(i-(numSegs-1))*segW:i*segW;
        const centeredX=landsLeft?xOffset+(numSegs-1)*segW/2:xOffset-(numSegs-1)*segW/2;
        mesh.position.set(centeredX*S.currentFoldZoom, PEDESTAL_Y+60+segH/2, OBELISK_Z);
        if(isInverted) mesh.rotation.z=Math.PI;
        room.scene.add(mesh);
        room.stageMeshes.push(mesh);
      });
    }
  }

  function rebuildTray(altarId) {
    const room=ROOMS[altarId]; if(!room) return;
    room.trayMeshes.forEach(m=>{
      if(m.userData.primeLight) m.remove(m.userData.primeLight);
      room.scene.remove(m);
    });
    room.trayMeshes=[];

    const n=S.fNum; if(!n) return;
    const factors=Array.from(S.fDisc).sort((a,b)=>a-b);
    const count=factors.length;
    const spread=WU*1.1;
    const startX=-(count-1)*spread/2;

    factors.forEach((f,i)=>{
      const mesh=makeBlockMesh(1, !(f===1||isPrime(f)));
      if(f===1) mesh.material=mirrorMat;
      else if(isPrime(f)) mesh.material=primeMat;
      else mesh.material=metalMat;
      if(mesh.userData.labelSprite){
        mesh.remove(mesh.userData.labelSprite);
        const isMirrorBlock=f===1;
        const isPrimeBlock=isPrime(f)&&f!==1;
        const sp=makeLabel(f,isPrimeBlock,isMirrorBlock);
        sp.scale.set(WU*0.78,WU*0.65,1);
        sp.position.set(0,0,DEPTH/2+2);
        mesh.add(sp);
        mesh.userData.labelSprite=sp;
      }
      if(isPrime(f)&&f!==1&&!mesh.userData.primeLight){
        const pl=new THREE.PointLight(0xff8030,20,WU*3,1.5);
        pl.position.set(0,0,DEPTH/2+10);
        mesh.add(pl); mesh.userData.primeLight=pl;
      }
      mesh.position.set(startX+i*spread, room.pedestalY+WU/2+2, PEDESTAL_Z);
      mesh.scale.set(0.85,0.85,0.85);
      room.scene.add(mesh);
      room.trayMeshes.push(mesh);
    });
  }

  return { init, rebuildStage, rebuildTray, ROOMS };
})();
</script>
