function renderFT() {
  const tray=document.getElementById('ft');tray.innerHTML='';
  clearThreeOverlay('fa');
  const n=S.fNum;if(!n)return;
  allFactors(n).forEach(f=>{
    const s=document.createElement('div');s.className='fs';
    s.dataset.units = '1';
    const txt=document.createElement('div');txt.textContent=f;
    if(f===1){
      s.classList.add('mirror','mirror-cube');
      txt.className='n-mirror';
    } else {
      txt.style.position='relative';txt.style.zIndex='2';
    }
    s.appendChild(txt);
    if(f!==1){
      if(f===n){
        if(isPrime(n)) { s.classList.add('fn-identity','fn-prime'); }
        else if(S.trayIdentityReady && S.fDisc.has(f)) { s.classList.add('fn-identity','fn-comp'); }
        else { s.classList.add('empty'); txt.textContent=''; }
      }
      else if(S.fDisc.has(f))s.classList.add(isPrime(f)?'fp':'fc');
      else{s.classList.add('empty');txt.textContent='';}
    }
    if(f===n&&!isPrime(n)&&!S.fDisc.has(f))txt.textContent='';
    tray.appendChild(s);
    if (!s.classList.contains('empty')) {
      const forceComposite = !(f === 1 || isPrime(f));
      s._mesh = createThreeBlockMesh(1, WORLD_UNIT, WORLD_UNIT, forceComposite);
      s._meshBase = { w: WORLD_UNIT, h: WORLD_UNIT };
      attachBlockLabel(s._mesh, f, WORLD_UNIT, WORLD_UNIT, false, forceComposite);
      syncThreeBlock(s);
    }
  });
}

function enterBuild(n){
  syncCSSUnit();
  if (window.THREE) {
    initThreeRoom('ba', 'three-canvas-ba');
    clearThreeOverlay('ba');
  }
  S.bNum=n;S.bStack=[];S.bProduct=0;S.bAnimating=false;
  const numEl=document.getElementById('build-numeral');
  numEl.textContent=n; numEl.classList.remove('solved','celebrate');
  const isSolved=S.bDone.has(n);
  if(isSolved){numEl.classList.add('solved');}
  numEl.onclick=isSolved?()=>goToGrid():null;

  const altar=document.getElementById('ba');
  const stageBottomPx = 128;
  const vaultTopPad = 40;
  let maxStackPx = altar.clientHeight - stageBottomPx - vaultTopPad;
  if (maxStackPx <= 0) maxStackPx = window.innerHeight * 0.42;
  const neededHeight = n * S.bUnitH;
  S.bZoom = neededHeight > maxStackPx ? (maxStackPx / neededHeight) : 1;
  const zoomEl = document.getElementById('bz');
  zoomEl.style.transition = 'none';
  zoomEl.style.transform = `translateX(0) scale(${S.bZoom})`;

}

      const hingeY=prev*uH;
      const zone=document.createElement('div');zone.className='bundo-zone';zone.style.top=hingeY+'px';
      const mark=document.createElement('div');mark.className='bundo-mark';zone.appendChild(mark);
      zone.addEventListener('pointerdown',e=>{e.preventDefault();undoBuild();}); el.appendChild(zone);
    }
  }
  stage.appendChild(el);
  syncThreeBlock(el);

function renderBuildTray(){
  const tray=document.getElementById('bt');tray.innerHTML='';
  if(S.bStack.length===0){ const hint=document.createElement('div');hint.className='bt-empty'; tray.appendChild(hint); return; }
  S.bStack.forEach((entry,i)=>{
    const s=document.createElement('div'); 
    
    // Unify prime materials based on value
    if (entry.p === 1) {
      s.className = 'dex-mirror mirror-cube';
      const num = document.createElement('div'); num.className = 'n-mirror'; num.textContent = '1';
      s.appendChild(num);
    } else {
      s.className = 'dex-trinket';
      const num = document.createElement('div'); num.className = 'dt-num'; num.textContent = entry.p;
      s.appendChild(num);
    }

    if(i===S.bStack.length-1){
      s.classList.add('last'); s.style.touchAction='none'; s.style.cursor='pointer';
      s.addEventListener('pointerdown',e=>{
        if(S.bAnimating)return; e.preventDefault(); s.setPointerCapture(e.pointerId);
        const startY=e.clientY; let removed=false;
        const onMove=ev=>{ if(ev.clientY-startY>20&&!removed){ removed=true; s.removeEventListener('pointermove',onMove); s.removeEventListener('pointerup',onUp); undoBuild(); } };
        const onUp=()=>{ s.removeEventListener('pointermove',onMove); s.removeEventListener('pointerup',onUp); };
        s.addEventListener('pointermove',onMove,{passive:false}); s.addEventListener('pointerup',onUp);
      });
    }
    tray.appendChild(s);
  });
}

function setupBuildDexDrag(){
  const vp=document.getElementById('build-dex-vp'); if(!vp)return;
  vp._dragHandler&&vp.removeEventListener('pointerdown',vp._dragHandler); delete vp._dragHandler;
  vp.querySelectorAll('.dex-slot[data-n]').forEach(slot=>{

      if(S.bAnimating)return; e.preventDefault(); e.stopPropagation(); fresh.setPointerCapture(e.pointerId); startBuildDrag(e,n,fresh);

}

function startBuildDrag(e,p,sourceEl){
  const size=44; const dexRect=document.getElementById('build-dex-container').getBoundingClientRect();
  const drag=document.createElement('div'); drag.className='dragging-trinket';
  drag.style.cssText=`width:${size}px;height:${size}px;font-size:13px;left:${e.clientX-size/2}px;top:${e.clientY-size/2}px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px) saturate(1.5); border:1px solid rgba(255,255,255,0.6); box-shadow:inset 0 0 20px 5px rgba(255,255,255,0.8), 0 8px 16px rgba(0,0,0,0.6); text-shadow:0 0 10px #fff, 0 0 20px #FFD700, 0 0 40px #FF8C00; z-index:9500; position:fixed; pointer-events:none; border-radius:4px;`;
  drag.textContent=p; document.body.appendChild(drag);
  sourceEl.style.opacity='0.4';
  const onMove=ev=>{ drag.style.left=(ev.clientX-size/2)+'px'; drag.style.top=(ev.clientY-size/2)+'px'; };
  const onUp=ev=>{
    sourceEl.removeEventListener('pointermove',onMove); sourceEl.removeEventListener('pointerup',onUp); sourceEl.removeEventListener('pointercancel',onUp);
    sourceEl.style.opacity=''; drag.remove();
    if(ev.clientY<dexRect.top-10) placeBuildPrime(p);
  };
  sourceEl.addEventListener('pointermove',onMove,{passive:true}); sourceEl.addEventListener('pointerup',onUp); sourceEl.addEventListener('pointercancel',onUp);
}

function triggerShatter(rectElement, contactY) {
    haptic([60,30,60,20,80]);
    const rect = rectElement.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = contactY != null ? contactY : rect.top;
    const spawn = (cls, w, h, spread, dur) => {
      const piece = document.createElement('div');
      piece.className = 'shatter-piece ' + cls;
      const dx = (Math.random()-0.5) * spread * 2;
      const dy = -(Math.random() * spread * 0.6) + (Math.random()-0.5) * spread * 0.8;
      piece.style.cssText = `width:${w}px;height:${h}px;left:${cx+((Math.random()-0.5)*rect.width*0.4)}px;top:${cy+((Math.random()-0.5)*12)}px;--tx:translate(${dx}px,${dy}px);--rot:${(Math.random()-0.5)*720}deg;animation:shatterFly ${dur}s ease-out forwards;`;
      document.body.appendChild(piece); setTimeout(()=>piece.remove(), dur*1000+50);
    };
    for(let i=0;i<8;i++) spawn('shard', Math.random()*8+3, Math.random()*12+4, 250, 0.5+Math.random()*0.3);
    for(let i=0;i<12;i++) spawn('spark', Math.random()*5+2, Math.random()*5+2, 300, 0.4+Math.random()*0.4);
    for(let i=0;i<18;i++) spawn('ember', Math.random()*3+1, Math.random()*3+1, 350, 0.3+Math.random()*0.5);
    const flash = document.createElement('div');
    flash.style.cssText = `position:fixed;left:${cx-40}px;top:${cy-40}px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.9) 0%,rgba(255,200,80,0.6) 30%,rgba(255,100,20,0.3) 60%,transparent 80%);pointer-events:none;z-index:8600;opacity:1;transition:all 0.3s ease-out;`;
    document.body.appendChild(flash);
    requestAnimationFrame(()=>{ flash.style.transform='scale(3)'; flash.style.opacity='0'; });
    setTimeout(()=>flash.remove(), 350);
}

function placeBuildPrime(p){
  if(S.bAnimating)return;
  const n=S.bNum, prevProduct=S.bProduct, newProduct=prevProduct===0?p:prevProduct*p;
  S.bStack.push({p,prevProduct}); S.bProduct=newProduct;

  if(p === 1) {
    S.bAnimating = true;
    animateStackingOnes(p, n, S.bUnitH, S.bUnitW, () => {
      S.bAnimating = false;
      renderBuildStage(); renderBuildTray(); renderBuildLedger();
      if(newProduct === n) checkBuildSolved();
    }, () => {
      S.bStack.pop(); S.bProduct = prevProduct; S.bAnimating = false;
      renderBuildStage(); renderBuildTray(); renderBuildLedger();
    });
    return;
  }
  
  if(prevProduct === 0) {
    if(newProduct > n) {
      S.bStack.pop(); S.bProduct=0;
      renderBuildStage(); renderBuildTray(); renderBuildLedger();
      return;
    }
    renderBuildStage(); renderBuildTray(); renderBuildLedger();
    if(newProduct === n) checkBuildSolved();
    return;
  }

  S.bAnimating = true;
  if(newProduct > n) {
    animateBuildOvershoot(prevProduct, p, newProduct, n, () => { 
      S.bStack.pop(); S.bProduct=prevProduct; S.bAnimating=false; 
      renderBuildStage(); renderBuildTray(); renderBuildLedger(); 
    });
  } else {
    renderBuildStage(); renderBuildTray(); renderBuildLedger();
    animateBuildHinge(prevProduct, p, newProduct, n, () => { S.bAnimating=false; if(newProduct===n)checkBuildSolved(); });
  }
}

function animateStackingOnes(p, target, uH, uW, onComplete, onShatter) {
    const stage = document.getElementById('bo');
    stage.innerHTML = '';
    clearThreeStage('ba');
    const blocks = [];
    let hitIndex = -1;
    
    for(let i=0; i<p; i++){
      const blk = makeBlock(1, uW, uH, false, false);
      applyMirrorReflectY(blk, i, p);
      blk.style.position = 'absolute';
      blk.style.bottom = `${i * uH}px`;
      blk.style.left = '50%';
      stage.appendChild(blk);
      blocks.push(blk);
      syncThreeBlock(blk);
      
      if (i >= target && hitIndex === -1) hitIndex = i;
      gsap.set(blk, { y: -600, x: '-50%', opacity: 0 }); 
    }
    
    let tl = gsap.timeline();
    blocks.forEach((blk, i) => {
        const mesh = blk._mesh;
        const pos = getDirectBlockPosition(blk);
        blk.dataset.animating = '1';
        mesh.position.set(pos.x, pos.y + 600, 150);
        if (hitIndex !== -1 && i > hitIndex) return; 
        
        if (i === hitIndex) {
            tl.to(mesh.position, {
                y: pos.y + ((i - target) * uH),
                duration: 0.2, ease: "power1.in", onUpdate: requestThreeRender,
                onComplete: () => { delete blk.dataset.animating; triggerShatter(blk); onShatter(); }
            });
            tl.to(blk, {
                y: -((i - target)*uH), 
                x: '-50%', opacity: 1, duration: 0.2, ease: "power1.in",
            });
        } else {
            tl.to(mesh.position, { y: pos.y, duration: 0.3, ease: "bounce.out", onStart: () => haptic(15), onUpdate: requestThreeRender }, i * 0.15);
            tl.to(blk, { y: 0, x: '-50%', opacity: 1, duration: 0.3, ease: "bounce.out", onStart: () => haptic(15) }, i * 0.15);
        }
    });
    
    if (hitIndex === -1) {
        tl.to({}, { duration: 0.1, onComplete: () => {
            const flash = document.createElement('div');
            flash.style.cssText = `position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:${uW}px; height:${p*uH}px; z-index:100; opacity:0; border-radius:4px; background:#fff; box-shadow:0 0 50px 20px #fff; pointer-events:none;`;
            stage.appendChild(flash);
            gsap.to(flash, { opacity: 1, duration: 0.15, yoyo: true, repeat: 1, onComplete: onComplete });
        }});
    }
}

function animateBuildHinge(prevH, p, finalH, target, cb){
  const stage = document.getElementById('bo'), altar = document.getElementById('ba'), uH = S.bUnitH, uW = S.bUnitW, segH = prevH * uH;
  stage.style.visibility = 'hidden';
  const overlay = document.createElement('div');
  overlay.className = 'three-proxy-layer';
  overlay.style.cssText = `position:absolute;bottom:128px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:50;pointer-events:none;width:${uW}px;overflow:visible;`;
  altar.appendChild(overlay);
  clearThreeOverlay('ba');
  const base = makeBlock(prevH, uW, segH); base.style.position = 'absolute'; base.style.bottom = '0'; base.style.left = '0'; base.style.zIndex = '10'; overlay.appendChild(base);
  syncThreeBlock(base);
  
  const copies = p - 1, phaseDur = 500, pause = 80;
  const arms = [];
  for(let i=0; i<copies; i++){
    const pivotBottom = (i + 1) * segH;
    const hw = document.createElement('div');
    hw.style.cssText = `position:absolute;bottom:${pivotBottom}px;left:0;width:${uW}px;height:0;transform-origin:50% 0%;transform:rotate(180deg);z-index:${5-i};`;
    const blk = makeBlock(prevH, uW, segH, false, true);
    blk.style.position = 'absolute'; blk.style.bottom = '0'; blk.style.left = '0';
    hw.appendChild(blk); overlay.appendChild(hw); arms.push({hw, blk});
    syncThreeBlock(blk);
  }
  arms.forEach(({hw, blk},i) => {
    const mesh = blk._mesh;
    const pos = getDirectBlockPosition(blk);
    blk.dataset.animating = '1';
    mesh.position.set(pos.x, pos.y + segH * 0.35, 150);
    mesh.rotation.z = Math.PI;
    setTimeout(() => {
      hw.style.transition = `transform ${phaseDur}ms var(--ease-heavy)`;
      hw.style.transform = 'rotate(0deg)';
      gsap.to(mesh.position, { y: pos.y, duration: phaseDur / 1000, ease: "power2.out", onUpdate: () => syncThreeBlocks(document.body) });
      gsap.to(mesh.rotation, { z: 0, duration: phaseDur / 1000, ease: "power2.inOut", onUpdate: () => syncThreeBlocks(document.body) });
      haptic(20);
    }, i * (phaseDur+pause));
  });
  const allLandedTime = copies*(phaseDur+pause)+200;
  setTimeout(() => {
    arms.forEach(({blk},i) => {
      delete blk.dataset.animating;
      const p2 = isPrime(prevH);
      const num = document.createElement('div');
      num.className = p2 ? 'n-glow' : 'n-stamp';
      num.textContent = prevH;
      num.style.fontSize = Math.min(uW*(p2?0.6:0.55), segH*(p2?0.45:0.4), p2?38:34)+'px'; num.style.opacity='0';
      blk.appendChild(num);
      gsap.to(num, {opacity:1, duration:0.25, delay:i*0.08});
    });
    setTimeout(() => {
      clearThreeOverlay('ba');
      overlay.remove(); stage.style.visibility = 'visible'; renderBuildStage(); cb&&cb();
    }, 300);
  }, allLandedTime);
}

function animateBuildOvershoot(prevH, p, finalH, target, cb){
  const stage = document.getElementById('bo'), altar = document.getElementById('ba'), uH = S.bUnitH, uW = S.bUnitW, segH = prevH * uH, ceilPx = target * uH;
  stage.style.visibility = 'hidden';
  clearThreeOverlay('ba');
  
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:absolute;bottom:128px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:50;pointer-events:none;width:${uW}px;overflow:visible;`;
  altar.appendChild(overlay);
  
  const base = makeBlock(prevH, uW, segH); base.style.position = 'absolute'; base.style.bottom = '0'; base.style.left = '0'; base.style.zIndex = '10'; overlay.appendChild(base);
  
  const copies = p - 1, phaseDur = 500, pause = 80;
  const arms = [];
  for(let i=0; i<copies; i++){
    const pivotBottom = (i + 1) * segH;
    const hw = document.createElement('div');
    hw.style.cssText = `position:absolute;bottom:${pivotBottom}px;left:0;width:${uW}px;height:0;transform-origin:50% 0%;transform:rotate(180deg);z-index:${5-i};`;
    const blk = makeBlock(prevH, uW, segH, false, true);
    blk.style.position = 'absolute'; blk.style.bottom = '0'; blk.style.left = '0';
    hw.appendChild(blk); overlay.appendChild(hw); arms.push(hw);
    syncThreeBlock(blk);
  }
  
  let collisionArm = -1, collisionAngle = 0;
  for(let i=0; i<copies; i++){
    const pivotY = (i + 1) * segH;
    const headroom = ceilPx - pivotY;
    if(headroom >= segH) continue;
    const cosA = Math.max(-1, Math.min(1, headroom / segH));
    collisionAngle = Math.acos(cosA) * (180 / Math.PI);
    collisionArm = i; break;
  }
  const safeCount = collisionArm >= 0 ? collisionArm : copies;
  
  arms.forEach((hw,i) => {
    if(i < safeCount) setTimeout(() => {
      gsap.to(hw, {
        rotation: 0,
        duration: phaseDur / 1000,
        ease: "power2.inOut",
        overwrite: 'auto',
        onStart: () => haptic(20),
        onUpdate: () => syncThreeBlocks(document.body)
      });
    }, i * (phaseDur+pause));
  });
  
  if(collisionArm >= 0){
    const fraction = (180 - collisionAngle) / 180;
    const collisionDur = Math.max(120, Math.round(phaseDur * fraction));
    setTimeout(() => {
      const hw = arms[collisionArm];
      gsap.to(hw, {
        rotation: collisionAngle,
        duration: collisionDur / 1000,
        ease: "power2.inOut",
        overwrite: 'auto',
        onStart: () => haptic(20),
        onUpdate: () => syncThreeBlocks(document.body)
      });
      setTimeout(() => {
        arms.forEach(a => { a.style.display = 'none'; });
        const ceilEl = document.getElementById('bceil');
        const contactY = ceilEl ? ceilEl.getBoundingClientRect().top : undefined;
        triggerShatter(overlay, contactY);
        setTimeout(() => { clearThreeOverlay('ba'); overlay.remove(); stage.style.visibility = 'visible'; cb&&cb(); }, 400);
      }, collisionDur + 30);
    }, collisionArm * (phaseDur + pause));
  }
}

function undoBuild(){
  if(S.bAnimating||S.bStack.length===0)return;
  const entry=S.bStack[S.bStack.length-1], p=entry.p, prevProduct=entry.prevProduct;
  if(prevProduct===0){ S.bStack.pop(); S.bProduct=0; haptic(20); renderBuildStage();renderBuildTray();renderBuildLedger(); return; }
  S.bAnimating=true; haptic(20);
  const stage=document.getElementById('bo'), altar=document.getElementById('ba'), uH=S.bUnitH, uW=S.bUnitW, segH=prevProduct*uH;
  stage.style.visibility='hidden';
  clearThreeOverlay('ba');
  const overlay=document.createElement('div');
  overlay.style.cssText=`position:absolute;bottom:128px;left:50%;transform-origin:bottom center;transform:translateX(-50%) scale(${S.bZoom});z-index:50;pointer-events:none;width:${uW}px;overflow:visible;`;
  altar.appendChild(overlay);
  const base=makeBlock(prevProduct,uW,segH); base.style.position='absolute';base.style.bottom='0';base.style.left='0'; overlay.appendChild(base);
  const copies=p-1, phaseDur=350, pause=50;
  const arms=[];
  for(let i=0;i<copies;i++){
    const pivotBottom = (i + 1) * segH;
    const hw=document.createElement('div');
    hw.style.cssText=`position:absolute;bottom:${pivotBottom}px;left:0;width:${uW}px;height:0;transform-origin:50% 0%;transform:rotate(0deg);`;
    const blk=makeBlock(prevProduct,uW,segH,false,false); blk.style.position='absolute';blk.style.bottom='0';blk.style.left='0';
    hw.appendChild(blk); overlay.appendChild(hw); arms.push(hw);
    syncThreeBlock(blk);
  }
  const reversedArms=[...arms].reverse();
  reversedArms.forEach((hw,i)=>{
    setTimeout(()=>{
      gsap.to(hw, {
        rotation: 180,
        duration: phaseDur / 1000,
        ease: "power2.inOut",
        overwrite: 'auto',
        onStart: () => haptic(15),
        onUpdate: () => syncThreeBlocks(document.body)
      });
    },i*(phaseDur+pause));
  });
  setTimeout(()=>{ clearThreeOverlay('ba'); overlay.remove(); S.bStack.pop(); S.bProduct=prevProduct; stage.style.visibility='visible'; S.bAnimating=false; renderBuildStage();renderBuildTray();renderBuildLedger(); }, reversedArms.length*(phaseDur+pause)+150);
}

function checkBuildSolved(){
  const n=S.bNum;if(!n||S.bDone.has(n))return;
  S.bDone.add(n); const numEl=document.getElementById('build-numeral'); numEl.onclick=()=>goToGrid();
  setTimeout(()=>{
    showAffirm(); numEl.classList.add('celebrate'); haptic([20,25,20,25,40]);
    setTimeout(()=>{ numEl.classList.remove('celebrate'); numEl.classList.add('solved'); },1100);
  },300);
}

// INIT
S.fDone.add(1); buildDex('altar-dex-vp'); buildDex('grid-vp');
if (window.THREE) { enterAltar(12); }

</script>
